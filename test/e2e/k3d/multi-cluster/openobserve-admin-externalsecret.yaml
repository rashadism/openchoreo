# ExternalSecret that creates openobserve-admin-credentials from OpenBao.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openobserve-admin-credentials
  namespace: openchoreo-observability-plane
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: default
  target:
    name: openobserve-admin-credentials
  data:
  - secretKey: ZO_ROOT_USER_EMAIL
    remoteRef:
      key: openobserve-admin-email
      property: value
  - secretKey: ZO_ROOT_USER_PASSWORD
    remoteRef:
      key: openobserve-admin-password
      property: value
