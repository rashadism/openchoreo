# ClusterDataPlane CR for e2e testing
# The clusterAgent.clientCA.value is replaced at apply time by the Makefile
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterDataPlane
metadata:
  name: default
spec:
  planeID: default
  clusterAgent:
    clientCA:
      value: ""
  secretStoreRef:
    name: default
  gateway:
    ingress:
      external:
        name: gateway-default
        namespace: openchoreo-data-plane
        http:
          port: 29080
          host: e2e-dp.local
        https:
          port: 29443
          host: e2e-dp.local
      internal:
        name: gateway-internal
        namespace: openchoreo-data-plane
        http:
          port: 18080
          host: e2e-dp-internal.local
