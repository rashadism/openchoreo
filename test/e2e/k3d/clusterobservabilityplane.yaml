# ClusterObservabilityPlane CR for e2e testing.
# Cluster-scoped ObservabilityPlane that can be referenced from any control
# plane namespace — required so the linker step (`_e2e.link-observability`)
# can patch `clusterdataplane.spec.observabilityPlaneRef` to point at it.
# The clusterAgent.clientCA.value is replaced at apply time by the Makefile.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterObservabilityPlane
metadata:
  name: default
spec:
  planeID: default
  clusterAgent:
    clientCA:
      value: ""
  # External URL of the observer Service — must be browser-accessible because
  # Backstage returns this URL to the browser for direct observability calls.
  # The Go e2e framework helpers bypass this CR and use in-cluster DNS directly.
  observerURL: http://observer.e2e-op.local:21080
