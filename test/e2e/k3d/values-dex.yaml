# Dex OIDC provider Helm values for external IdP e2e testing.
# Chart: dex/dex  (https://charts.dexidp.io)
# Installed into the "dex" namespace; exposed via dex-httproute.yaml.

# client_credentials grant support is not yet in any released Dex version.
# Pin to a specific master-branch build by manifest-list digest so the image is
# immutable and reproducible without tracking the mutable :master tag.
image:
  digest: "sha256:2b101af44637d2302988a4bfe0785d28632e70fb1fd06b9bee037bba9abea2fa"

config:
  issuer: http://dex.e2e-cp.local:28080/dex

  storage:
    type: memory

  web:
    http: 0.0.0.0:5556

  oauth2:
    skipApprovalScreen: true
    responseTypes:
      - code
    # Allow refresh tokens so Backstage can renew sessions without re-login.
    # offline_access scope is added to the CP oidcScope overlay to request them.
    grantTypes:
      - authorization_code
      - refresh_token
      - password
      - client_credentials
    passwordConnector: local

  enablePasswordDB: true

  staticPasswords:
    - email: "admin@openchoreo.dev"
      # bcrypt hash of "Admin@123" (cost 10, generated by htpasswd -nbB -C 10)
      hash: "$2y$10$K7ApKj9FtcQ6yNTGcb2jruseDhwrg5Ug4ZdJbschGSc6b1nlok0lK"
      username: "admin"
      userID: "dex-admin-00000000-0000-0000-0000-000000000001"
      groups:
        - admins

  staticClients:
    - id: openchoreo-backstage-client
      secret: backstage-portal-secret
      name: Backstage
      redirectURIs:
        - http://openchoreo.e2e-cp.local:28080/api/auth/openchoreo-auth/handler/frame

ingress:
  enabled: false

service:
  ports:
    http:
      port: 5556
      targetPort: http
