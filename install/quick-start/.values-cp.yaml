# Helm values for OpenChoreo Control Plane in quick-start container

openchoreoApi:
  http:
    hostnames:
    - api.openchoreo.localhost
  config:
    server:
      publicUrl: "http://api.openchoreo.localhost:8080"
    security:
      authorization:
        bootstrap:
          # Helm replaces lists so all mappings must be specified here.
          # The chart defaults provide the first 3; quick-start adds the CLI binding.
          mappings:
            - name: admin-binding
              system: true
              roleMappings:
                - roleRef:
                    name: admin
              entitlement:
                claim: groups
                value: admins
              effect: allow
            - name: backstage-catalog-reader-binding
              system: true
              roleMappings:
                - roleRef:
                    name: backstage-catalog-reader
              entitlement:
                claim: sub
                value: openchoreo-backstage-client
              effect: allow
            - name: rca-agent-binding
              system: true
              roleMappings:
                - roleRef:
                    name: rca-agent
              entitlement:
                claim: sub
                value: openchoreo-rca-agent
              effect: allow
            - name: quickstart-cli-admin-binding
              roleMappings:
                - roleRef:
                    name: admin
              entitlement:
                claim: sub
                value: openchoreo-cli-quickstart
              effect: allow
            - name: workload-publisher-binding
              system: true
              roleMappings:
                - roleRef:
                    name: workload-publisher
              entitlement:
                claim: sub
                value: openchoreo-workload-publisher-client
              effect: allow
            - name: observer-resource-reader-binding
              system: true
              roleMappings:
                - roleRef:
                    name: observer-resource-reader
              entitlement:
                claim: sub
                value: openchoreo-observer-resource-reader-client
              effect: allow

backstage:
  secretName: backstage-secrets
  baseUrl: "http://openchoreo.localhost:8080"
  http:
    hostnames:
    - openchoreo.localhost

security:
  oidc:
    issuer: "http://thunder.openchoreo.localhost:8080"
    jwksUrl: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
    authorizationUrl: "http://thunder.openchoreo.localhost:8080/oauth2/authorize"
    tokenUrl: "http://thunder.openchoreo.localhost:8080/oauth2/token"

gateway:
  httpPort: 8080
  httpsPort: 8443
  tls:
    enabled: false
