{{- if .Values.portalAssistant.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openchoreo-control-plane.portalAssistant.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-assistant
automountServiceAccountToken: false
{{- end }}
