{{- if .Values.security.authz.enabled }}
{{- if .Values.openchoreoApi.config.security.authorization.bootstrap.roles }}
{{- range .Values.openchoreoApi.config.security.authorization.bootstrap.roles }}
{{- if eq (default "" .namespace) "" }}
---
# Cluster-scoped role
apiVersion: openchoreo.dev/v1alpha1
kind: AuthzClusterRole
metadata:
  name: {{ .name }}
  labels:
    {{- include "openchoreo-control-plane.labels" $ | nindent 4 }}
    openchoreo.io/bootstrap: "true"
    {{- if .system }}
    openchoreo.io/system: "true"
    {{- end }}
spec:
  {{- if and .description (ne .description "") }}
  description: {{ .description | quote }}
  {{- end }}
  actions:
    {{- range .actions }}
    - {{ . | quote }}
    {{- end }}
{{- else }}
---
# Namespace-scoped role
apiVersion: openchoreo.dev/v1alpha1
kind: AuthzRole
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" $ | nindent 4 }}
    openchoreo.io/bootstrap: "true"
    {{- if .system }}
    openchoreo.io/system: "true"
    {{- end }}
spec:
  {{- if and .description (ne .description "") }}
  description: {{ .description | quote }}
  {{- end }}
  actions:
    {{- range .actions }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.openchoreoApi.config.security.authorization.bootstrap.mappings }}
{{- range .Values.openchoreoApi.config.security.authorization.bootstrap.mappings }}
{{- $hierarchyNs := "" }}
{{- if .hierarchy }}
{{- $hierarchyNs = default "" .hierarchy.namespace }}
{{- end }}
{{- if eq $hierarchyNs "" }}
---
# Cluster-scoped binding
apiVersion: openchoreo.dev/v1alpha1
kind: AuthzClusterRoleBinding
metadata:
  name: {{ .name }}
  labels:
    {{- include "openchoreo-control-plane.labels" $ | nindent 4 }}
    openchoreo.io/bootstrap: "true"
    {{- if .system }}
    openchoreo.io/system: "true"
    {{- end }}
spec:
  roleMappings:
    {{- range .roleMappings }}
    - roleRef:
        name: {{ .roleRef.name }}
        kind: AuthzClusterRole
    {{- end }}
  entitlement:
    claim: {{ .entitlement.claim }}
    value: {{ .entitlement.value }}
  effect: {{ .effect }}
{{- else }}
---
# Namespace-scoped binding
apiVersion: openchoreo.dev/v1alpha1
kind: AuthzRoleBinding
metadata:
  name: {{ .name }}
  namespace: {{ $hierarchyNs }}
  labels:
    {{- include "openchoreo-control-plane.labels" $ | nindent 4 }}
    openchoreo.io/bootstrap: "true"
    {{- if .system }}
    openchoreo.io/system: "true"
    {{- end }}
spec:
  roleMappings:
    {{- range .roleMappings }}
    - roleRef:
        name: {{ .roleRef.name }}
        kind: {{ if eq (default "" .roleRef.namespace) "" }}AuthzClusterRole{{ else }}AuthzRole{{ end }}
      {{- if and .targetPath (or .targetPath.project .targetPath.component) }}
      targetPath:
        {{- if .targetPath.project }}
        project: {{ .targetPath.project }}
        {{- end }}
        {{- if .targetPath.component }}
        component: {{ .targetPath.component }}
        {{- end }}
      {{- end }}
    {{- end }}
  entitlement:
    claim: {{ .entitlement.claim }}
    value: {{ .entitlement.value }}
  effect: {{ .effect }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
