{{- if .Values.perchAgent.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openchoreo-control-plane.perchAgent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: perch-agent
automountServiceAccountToken: false
{{- end }}
