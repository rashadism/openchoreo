{{- if .Values.perchAgent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openchoreo-control-plane.perchAgent.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: perch-agent
spec:
  type: {{ .Values.perchAgent.service.type }}
  ports:
  - port: {{ .Values.perchAgent.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "openchoreo-control-plane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: perch-agent
{{- end }}
