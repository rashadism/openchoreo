apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "openchoreo-control-plane.clusterGateway.name" . }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-gateway
rules:
# Allow reading DataPlane CRs to get client CA configuration
- apiGroups: ["openchoreo.dev"]
  resources: ["dataplanes"]
  verbs: ["get", "list", "watch"]
# Allow reading ClusterDataPlane CRs to get client CA configuration
- apiGroups: ["openchoreo.dev"]
  resources: ["clusterdataplanes"]
  verbs: ["get", "list", "watch"]
# Allow reading WorkflowPlane CRs to get client CA configuration
- apiGroups: ["openchoreo.dev"]
  resources: ["workflowplanes"]
  verbs: ["get", "list", "watch"]
# Allow reading ClusterWorkflowPlane CRs to get client CA configuration
- apiGroups: ["openchoreo.dev"]
  resources: ["clusterworkflowplanes"]
  verbs: ["get", "list", "watch"]
# Allow reading ObservabilityPlane CRs to get client CA configuration
- apiGroups: ["openchoreo.dev"]
  resources: ["observabilityplanes"]
  verbs: ["get", "list", "watch"]
# Allow reading ClusterObservabilityPlane CRs to get client CA configuration
- apiGroups: ["openchoreo.dev"]
  resources: ["clusterobservabilityplanes"]
  verbs: ["get", "list", "watch"]
# Allow reading Secrets for client CA certificates
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
