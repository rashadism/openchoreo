apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: projectreleasebindings.openchoreo.dev
spec:
  group: openchoreo.dev
  names:
    kind: ProjectReleaseBinding
    listKind: ProjectReleaseBindingList
    plural: projectreleasebindings
    shortNames:
    - prb
    - prbs
    singular: projectreleasebinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.owner.projectName
      name: Project
      type: string
    - jsonPath: .spec.environment
      name: Environment
      type: string
    - jsonPath: .spec.projectRelease
      name: Release
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ProjectReleaseBinding is the Schema for the projectreleasebindings API.
          Pins a ProjectRelease to an Environment, owns the cell namespace for the
          (Project, Environment) tuple, and applies the inlined (Cluster)ProjectType
          resources to that namespace. Authored externally; the Project controller
          only seeds an empty projectRelease pin and cascades deletion on project
          finalize.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ProjectReleaseBindingSpec defines the desired state of ProjectReleaseBinding.
              Pins a ProjectRelease to an Environment and carries per-env overrides for
              the schema declared on the inlined (Cluster)ProjectType environmentConfigs.
              Owns the cell namespace for (Project, Environment); applies the inlined
              (Cluster)ProjectType.spec.resources to that namespace.
              An empty projectRelease pin is seeded once by the Project controller with
              the project's latest release; advancing the pin afterwards is manual
              (e.g. via `occ project promote` or kubectl edit).
            properties:
              environment:
                description: Environment is the name of the Environment this binding
                  targets.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.environment is immutable
                  rule: self == oldSelf
              environmentConfigs:
                description: |-
                  EnvironmentConfigs provides per-environment values for the schema declared
                  on the inlined (Cluster)ProjectType environmentConfigs. Validated against
                  the schema on the referenced ProjectRelease by the binding controller;
                  failures surface via status.conditions.
                x-kubernetes-preserve-unknown-fields: true
              owner:
                description: Owner identifies the project this ProjectReleaseBinding
                  belongs to.
                properties:
                  projectName:
                    description: ProjectName is the name of the project that owns
                      this binding.
                    minLength: 1
                    type: string
                required:
                - projectName
                type: object
                x-kubernetes-validations:
                - message: spec.owner is immutable
                  rule: self == oldSelf
              projectRelease:
                description: |-
                  ProjectRelease is the name of the ProjectRelease pinned by this binding.
                  Leave unset to have the Project controller seed it once with the
                  project's latest release; the binding stays pending until the pin is
                  set. A set pin is never touched by controllers — advancing it is left
                  to whoever drives promotion (occ, GitOps, manual kubectl edit).
                type: string
            required:
            - environment
            - owner
            type: object
          status:
            description: ProjectReleaseBindingStatus defines the observed state of
              ProjectReleaseBinding.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the binding's state.
                  Includes Synced, NamespaceReady, ResourcesReady, and Ready (aggregate).
                  observedGeneration is set per-condition (project convention).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespace:
                description: |-
                  Namespace is the actual data-plane namespace owned by this binding
                  (dp-{ns}-{project}-{env}-{hash}). Surfaced here for kubectl describe and
                  debugging.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
