{{- if .Values.finOpsAgent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: finops-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-observability-plane.componentLabels" (dict "context" . "component" "finops-agent") | nindent 4 }}
spec:
  type: {{ .Values.finOpsAgent.service.type }}
  ports:
  - port: {{ .Values.finOpsAgent.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "openchoreo-observability-plane.componentSelectorLabels" (dict "context" . "component" "finops-agent") | nindent 4 }}
{{- end }}
