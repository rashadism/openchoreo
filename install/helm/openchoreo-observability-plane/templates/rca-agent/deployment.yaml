{{- if .Values.rca.enabled }}
{{- if not .Values.rca.secretName }}
{{- fail "rca.secretName is required when rca is enabled. Create a Secret with keys matching the RCA agent's expected env vars (RCA_LLM_API_KEY, OAUTH_CLIENT_SECRET, and optionally SQL_BACKEND_URI), then set rca.secretName." }}
{{- end }}
{{- if not .Values.rca.observerApiUrl }}
{{- fail "rca.observerApiUrl is required when rca is enabled. Set it to the Observer API base URL (e.g. http://observer:8080)." }}
{{- end }}
{{- if and (eq .Values.rca.reportBackend "sqlite") (gt (.Values.rca.replicas | int) 1) }}
{{- fail "rca.replicas must be 1 when using sqlite backend (ReadWriteOnce PVC). Set rca.replicas=1 or use reportBackend=postgresql." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.rca.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-observability-plane.componentLabels" (dict "context" . "component" .Values.rca.name) | nindent 4 }}
spec:
  replicas: {{ .Values.rca.replicas }}
  strategy:
    type: {{ ternary "Recreate" "RollingUpdate" (eq (.Values.rca.reportBackend | default "sqlite") "sqlite") }}
  selector:
    matchLabels:
      {{- include "openchoreo-observability-plane.componentSelectorLabels" (dict "context" . "component" .Values.rca.name) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/rca-agent/rca-agent-config.yaml") . | sha256sum }}
        checksum/observer-auth-config: {{ include (print $.Template.BasePath "/observer/observer-auth-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "openchoreo-observability-plane.componentSelectorLabels" (dict "context" . "component" .Values.rca.name) | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 12000
        runAsGroup: 12000
        fsGroup: 12000
      containers:
      - name: {{ .Values.rca.name }}
        image: "{{ .Values.rca.image.repository }}:{{ .Values.rca.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.rca.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.rca.service.port }}
          protocol: TCP
        envFrom:
        - secretRef:
            name: {{ .Values.rca.secretName }}
        - configMapRef:
            name: rca-agent-config
        {{- if .Values.rca.extraEnvs }}
        env:
        {{- toYaml .Values.rca.extraEnvs | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.rca.resources | nindent 10 }}

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        volumeMounts:
        - name: auth-config
          mountPath: /etc/openchoreo
          readOnly: true
        {{- if eq .Values.rca.reportBackend "sqlite" }}
        - name: data
          mountPath: /app/data
        {{- end }}

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 12000
      volumes:
      - name: auth-config
        configMap:
          name: observer-auth-config
      {{- if eq .Values.rca.reportBackend "sqlite" }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Values.rca.name }}-data
      {{- end }}
{{- end }}
