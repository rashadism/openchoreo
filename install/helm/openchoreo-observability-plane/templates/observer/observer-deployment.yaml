{{- if and (eq (.Values.observer.alertStoreBackend | default "sqlite") "sqlite") (gt (.Values.observer.replicas | int) 1) }}
{{- fail "observer.replicas must be 1 when observer.alertStoreBackend=sqlite (ReadWriteOnce PVC). Set observer.replicas=1 or use observer.alertStoreBackend=postgresql." }}
{{- end }}
{{- if and (eq (.Values.observer.alertStoreBackend | default "sqlite") "postgresql") (not .Values.observer.alertStoreSecretName) }}
{{- fail "observer.alertStoreSecretName is required when observer.alertStoreBackend=postgresql. Create a Secret with a 'postgresql-dsn' key containing the PostgreSQL connection string, then set observer.alertStoreSecretName." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-observability-plane.componentLabels" (dict "context" . "component" "observer") | nindent 4 }}
spec:
  replicas: {{ .Values.observer.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "openchoreo-observability-plane.componentSelectorLabels" (dict "context" . "component" "observer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openchoreo-observability-plane.componentSelectorLabels" (dict "context" . "component" "observer") | nindent 8 }}
    spec:
      serviceAccountName: observer
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: observer
        image: "{{ if .Values.observer.image }}{{ .Values.observer.image.repository | default "ghcr.io/openchoreo/observer" }}:{{ .Values.observer.image.tag | default .Chart.AppVersion }}{{ else }}ghcr.io/openchoreo/observer:{{ .Chart.AppVersion }}{{ end }}"
        imagePullPolicy: {{ if .Values.observer.image }}{{ .Values.observer.image.pullPolicy | default "IfNotPresent" }}{{ else }}IfNotPresent{{ end }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: http-internal
          containerPort: {{ if .Values.observer.internalService }}{{ .Values.observer.internalService.port | default 8081 }}{{ else }}8081{{ end }}
          protocol: TCP
        env:
        {{- if .Values.security.oidc.issuer }}
        - name: JWT_ISSUER
          value: {{ .Values.security.oidc.issuer | quote }}
        {{- end }}
        {{- if .Values.security.oidc.jwksUrl }}
        - name: JWKS_URL
          value: {{ .Values.security.oidc.jwksUrl | quote }}
        {{- end }}
        - name: JWKS_URL_TLS_INSECURE_SKIP_VERIFY
          value: {{ .Values.security.oidc.jwksUrlTlsInsecureSkipVerify | default "false" | quote }}
        - name: UID_RESOLVER_TLS_INSECURE_SKIP_VERIFY
          value: {{ .Values.security.oidc.uidResolverTlsInsecureSkipVerify | default "false" | quote }}
        {{- if .Values.security.jwt.audience }}
        - name: JWT_AUDIENCE
          value: {{ .Values.security.jwt.audience | quote }}
        {{- end }}
        - name: JWT_DISABLED
          value: "{{ not .Values.security.enabled }}"
        - name: PORT
          value: "8080"
        - name: INTERNAL_PORT
          value: {{ if .Values.observer.internalService }}{{ .Values.observer.internalService.port | default 8081 | quote }}{{ else }}"8081"{{ end }}
        - name: LOG_LEVEL
          value: {{ if .Values.observer }}{{ .Values.observer.logLevel | default "info" | quote }}{{ else }}"info"{{ end }}
        - name: OPENSEARCH_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observer.openSearchSecretName }}
              key: username
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observer.openSearchSecretName }}
              key: password
        - name: AI_RCA_ENABLED
          value: {{ .Values.rca.enabled | default false | quote }}
        - name: ALERT_STORE_BACKEND
          value: {{ .Values.observer.alertStoreBackend | default "sqlite" | quote }}
        {{- if and (eq (.Values.observer.alertStoreBackend | default "sqlite") "postgresql") .Values.observer.alertStoreSecretName }}
        - name: ALERT_STORE_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observer.alertStoreSecretName }}
              key: postgresql-dsn
        {{- end }}
        - name: OBSERVER_AUTH_CONFIG_PATH
          value: /etc/openchoreo/auth-config.yaml
        - name: AUTHZ_SERVICE_URL
          value: {{ .Values.observer.controlPlaneApiUrl | quote }}
        - name: AUTHZ_TLS_INSECURE_SKIP_VERIFY
          value: {{ .Values.observer.authzTlsInsecureSkipVerify | default false | quote }}
        # UIDResolver configuration for calling openchoreo-api with OAuth2 client credentials
        - name: UID_RESOLVER_OPENCHOREO_API_URL
          value: {{ .Values.observer.controlPlaneApiUrl | quote }}
        {{- if .Values.security.oidc.tokenUrl }}
        - name: UID_RESOLVER_OAUTH_TOKEN_URL
          value: {{ .Values.security.oidc.tokenUrl | quote }}
        {{- end }}
        - name: UID_RESOLVER_OAUTH_CLIENT_ID
          value: {{ .Values.observer.oauthClientId | default "openchoreo-observer" | quote }}
        {{- if .Values.observer.secretName }}
        - name: UID_RESOLVER_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observer.secretName }}
              key: oauth-client-secret
        {{- end }}
        {{- if .Values.security.oidc.authServerBaseUrl }}
        - name: AUTH_SERVER_BASE_URL
          value: {{ .Values.security.oidc.authServerBaseUrl | quote }}
        {{- end }}
        {{- if .Values.observer.cors.allowedOrigins }}
        - name: CORS_ALLOWED_ORIGINS
          value: {{ join "," .Values.observer.cors.allowedOrigins | quote }}
        {{- end }}
        # Logs adapter configuration
        - name: LOGS_ADAPTER_ENABLED
          value: {{ .Values.observer.logsAdapter.enabled | default false | quote }}
        - name: LOGS_ADAPTER_URL
          value: {{ .Values.observer.logsAdapter.url | default "http://logs-adapter:9100" | quote }}
        - name: LOGS_ADAPTER_TIMEOUT
          value: {{ .Values.observer.logsAdapter.timeout | default "30s" | quote }}
        # Tracing adapter configuration
        - name: TRACING_ADAPTER_ENABLED
          value: {{ .Values.observer.tracingAdapter.enabled | default false | quote }}
        - name: TRACING_ADAPTER_URL
          value: {{ .Values.observer.tracingAdapter.url | default "http://tracing-adapter:9098" | quote }}
        - name: TRACING_ADAPTER_TIMEOUT
          value: {{ .Values.observer.tracingAdapter.timeout | default "30s" | quote }}
        {{- if .Values.observer.extraEnvs }}
        {{- toYaml .Values.observer.extraEnvs | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: auth-config
          mountPath: /etc/openchoreo
          readOnly: true
        {{- if eq (.Values.observer.alertStoreBackend | default "sqlite") "sqlite" }}
        - name: alert-store-data
          mountPath: /data
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- if .Values.observer.resources }}
          {{- toYaml .Values.observer.resources | nindent 10 }}
          {{- else }}
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
          {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
      volumes:
      - name: auth-config
        configMap:
          name: observer-auth-config
      {{- if eq (.Values.observer.alertStoreBackend | default "sqlite") "sqlite" }}
      - name: alert-store-data
        persistentVolumeClaim:
          claimName: observer-alerts-data
      {{- end }}
