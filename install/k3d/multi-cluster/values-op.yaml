# Helm values for OpenChoreo Observability Plane in k3d multi-cluster setup

observer:
  secretName: observer-secret
  controlPlaneApiUrl: "http://api.openchoreo.localhost:8080"
  publicUrl: "http://observer.openchoreo.localhost:11080"
  cors:
    allowedOrigins:
    - "http://openchoreo.localhost:8080"
  http:
    hostnames:
    - host.k3d.internal
    - observer.openchoreo.localhost

security:
  oidc:
    jwksUrl: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
    tokenUrl: "http://thunder.openchoreo.localhost:8080/oauth2/token"
    jwksUrlTlsInsecureSkipVerify: "true"
    authServerBaseUrl: "http://thunder.openchoreo.localhost:8080"

gateway:
  httpPort: 11080
  httpsPort: 11085
  tls:
    enabled: false
  tlsPassthrough:
    enabled: true
    hostname: "opensearch.observability.openchoreo.localhost"
    port: 11085

clusterAgent:
  serverUrl: "wss://cluster-gateway.openchoreo.localhost:8443/ws"

tls:
  enabled: true
  dnsNames:
    - "observability.openchoreo.localhost"
    - "*.observability.openchoreo.localhost"

rca:
  openchoreoApiUrl: "http://api.openchoreo.localhost:8080"
  cors:
    allowedOrigins:
    - "http://openchoreo.localhost:8080"
  http:
    hostnames:
    - host.k3d.internal
    - rca-agent.observability.openchoreo.localhost
