apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: paketo-buildpacks-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-cache
            default: "build-cache.openchoreo-workflow-plane.svc.cluster.local:5100"
          - name: cache-layers-mode
            default: "reuse"
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
        - name: registries-conf
          configMap:
            name: "{{workflow.parameters.workflowrun-name}}-registries-conf"
            optional: true
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        env:
          - name: IMAGE_NAME
            value: '{{workflow.parameters.image-name}}'
          - name: IMAGE_TAG
            value: '{{workflow.parameters.image-tag}}'
          - name: GIT_REVISION
            value: '{{inputs.parameters.git-revision}}'
          - name: APP_PATH
            value: '{{workflow.parameters.app-path}}'
          - name: BUILD_ENV_JSON
            value: '{{workflow.parameters.build-env}}'
          - name: CACHE_REGISTRY
            value: '{{inputs.parameters.build-cache}}'
          - name: CACHE_LAYERS_MODE
            value: '{{inputs.parameters.cache-layers-mode}}'
        command: [sh, -c]
        args:
          - |-
            set -e

            WORKDIR=/mnt/vol/source
            IMAGE="${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"

            case "$CACHE_LAYERS_MODE" in disabled|reuse|rebuild) ;; *) echo ">> Error: invalid cache layers mode '$CACHE_LAYERS_MODE'"; exit 1 ;; esac

            if [ ! -d "$WORKDIR/$APP_PATH" ]; then
              echo ">> Error: The specified application path '$APP_PATH' does not exist in the repository"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /storage/run /storage/graph
            cat > /etc/containers/storage.conf <<STEOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            STEOF

            cat > /etc/containers/containers.conf <<CEOF
            [containers]
            netns="host"
            userns="host"
            ipcns="host"
            utsns="host"
            cgroupns="host"
            cgroups="disabled"
            log_driver = "k8s-file"
            [engine]
            cgroup_manager = "cgroupfs"
            events_logger="file"
            runtime="crun"
            CEOF

            mkdir -p /run/podman
            podman system service --time=0 unix:///run/podman/podman.sock &
            PODMAN_SVC_PID=$!
            export DOCKER_HOST=unix:///run/podman/podman.sock
            i=0
            until podman info --format '{{.Host.RemoteSocket.Exists}}' 2>/dev/null | grep -q true; do
              if ! kill -0 "$PODMAN_SVC_PID" 2>/dev/null; then
                echo ">> Error: podman service exited before its socket became ready"
                exit 1
              fi
              i=$((i + 1))
              if [ "$i" -ge 30 ]; then
                echo ">> Error: timed out waiting for the podman socket after 30s"
                exit 1
              fi
              sleep 1
            done

            # docker.io/paketobuildpacks/builder-jammy-full:0.3.603
            BUILDER="docker.io/paketobuildpacks/builder-jammy-full@sha256:9824e8d6e79f0b01f422dfd4062347a451956a1439cfe7874c42ca88418901dc"
            # docker.io/paketobuildpacks/run-jammy-full:0.1.130
            RUN_IMG="docker.io/paketobuildpacks/run-jammy-full@sha256:84a29ab400de17994da1270742de91718658dfbe4713cae9b765f0c9e1062eac"

            # Build --env flags as argv entries, not shell fragments.
            set --
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              while IFS= read -r kv; do
                [ -n "$kv" ] && set -- "$@" --env "$kv"
              done <<EOF
            $(printf '%s' "$BUILD_ENV_JSON" | jq -r '.[] | "\(.name)=\(.value)"')
            EOF
            fi

            CACHE_AVAILABLE="false"
            PACK_REGISTRY_ARGS=""
            if [ -n "$CACHE_REGISTRY" ] && [ "$CACHE_REGISTRY" != "none" ]; then
              if curl -sf --max-time 3 -o /dev/null "http://${CACHE_REGISTRY}/v2/" 2>/dev/null; then
                CACHE_AVAILABLE="true"
                PACK_REGISTRY_ARGS="--insecure-registry ${CACHE_REGISTRY}"
                mkdir -p /etc/containers/registries.conf.d
                cat > /etc/containers/registries.conf.d/build-cache.conf <<REGEOF
            [[registry]]
            location = "${CACHE_REGISTRY}"
            insecure = true
            REGEOF
              fi
            fi

            if [ -f /etc/containers/registries.conf.d/mirrors.conf ]; then
              echo ">> Upstream image mirror: mounted via registries.conf"
            fi

            if [ "$CACHE_AVAILABLE" = "true" ] && [ "$CACHE_LAYERS_MODE" != "disabled" ]; then
              CACHE_IMAGE="${CACHE_REGISTRY}/build-cache/cnb/${IMAGE_NAME}:cnb-cache"
              PUBLISH_REF="${CACHE_REGISTRY}/build-tmp/cnb/${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"
              CLEAR_CACHE_ARG=""
              if [ "$CACHE_LAYERS_MODE" = "rebuild" ]; then CLEAR_CACHE_ARG="--clear-cache"; fi

              pack build "$PUBLISH_REF" \
                --builder "$BUILDER" \
                --run-image "$RUN_IMG" \
                --path "$WORKDIR/$APP_PATH" \
                --pull-policy always \
                --publish \
                $PACK_REGISTRY_ARGS \
                --cache-image "$CACHE_IMAGE" \
                $CLEAR_CACHE_ARG \
                "$@"

              podman pull --tls-verify=false "$PUBLISH_REF"
              podman tag "$PUBLISH_REF" "$IMAGE"
              podman save -o /mnt/vol/app-image.tar "$IMAGE"
              exit 0
            fi

            pack build "$IMAGE" \
              --builder "$BUILDER" \
              --run-image "$RUN_IMG" \
              --docker-host inherit \
              --path "$WORKDIR/$APP_PATH" \
              --pull-policy always \
              $PACK_REGISTRY_ARGS \
              "$@"

            until podman image exists "$IMAGE" 2>/dev/null; do sleep 1; done
            podman save -o /mnt/vol/app-image.tar "$IMAGE"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
          - mountPath: /etc/containers/registries.conf.d/mirrors.conf
            subPath: mirrors.conf
            name: registries-conf
            readOnly: true
