# permissions for end users to view clusterprojecttypes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openchoreo
    app.kubernetes.io/managed-by: kustomize
  name: clusterprojecttype-viewer-role
rules:
- apiGroups:
  - openchoreo.dev
  resources:
  - clusterprojecttypes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openchoreo.dev
  resources:
  - clusterprojecttypes/status
  verbs:
  - get
