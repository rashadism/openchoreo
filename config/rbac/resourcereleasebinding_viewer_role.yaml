# permissions for end users to view resourcereleasebindings.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openchoreo
    app.kubernetes.io/managed-by: kustomize
  name: resourcereleasebinding-viewer-role
rules:
- apiGroups:
  - openchoreo.dev
  resources:
  - resourcereleasebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openchoreo.dev
  resources:
  - resourcereleasebindings/status
  verbs:
  - get
