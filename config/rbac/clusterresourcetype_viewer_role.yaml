# permissions for end users to view clusterresourcetypes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openchoreo
    app.kubernetes.io/managed-by: kustomize
  name: clusterresourcetype-viewer-role
rules:
- apiGroups:
  - openchoreo.dev
  resources:
  - clusterresourcetypes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openchoreo.dev
  resources:
  - clusterresourcetypes/status
  verbs:
  - get
