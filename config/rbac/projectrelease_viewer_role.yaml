# permissions for end users to view projectreleases.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openchoreo
    app.kubernetes.io/managed-by: kustomize
  name: projectrelease-viewer-role
rules:
- apiGroups:
  - openchoreo.dev
  resources:
  - projectreleases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openchoreo.dev
  resources:
  - projectreleases/status
  verbs:
  - get
