# permissions for end users to view projectreleasebindings.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openchoreo
    app.kubernetes.io/managed-by: kustomize
  name: projectreleasebinding-viewer-role
rules:
- apiGroups:
  - openchoreo.dev
  resources:
  - projectreleasebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - openchoreo.dev
  resources:
  - projectreleasebindings/status
  verbs:
  - get
