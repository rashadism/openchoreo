---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: workflows.openchoreo.dev
spec:
  group: openchoreo.dev
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    singular: workflow
