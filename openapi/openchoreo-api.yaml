              operations:
                type: array
                description: JSONPatch operations to apply
                minItems: 1
                items:
                  type: object
                  required:
                    - op
                    - path
                  properties:
                    op:
                      type: string
                      description: Operation type
                      enum: [add, replace, remove]
                    path:
                      type: string
