apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: publish-image
spec:
  templates:
    - name: publish-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
      outputs:
        parameters:
          - name: image
            valueFrom:
              path: /tmp/image.txt
      volumes:
        - name: registry-push-secret
          secret:
            optional: true
            secretName: '{{workflow.parameters.registry-push-secret}}'
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        env:
          - name: GIT_REVISION
            value: '{{inputs.parameters.git-revision}}'
          - name: IMAGE_NAME
            value: '{{workflow.parameters.image-name}}'
          - name: IMAGE_TAG
            value: '{{workflow.parameters.image-tag}}'
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            SRC_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"

            REGISTRY_ENDPOINT="ttl.sh/openchoreo-builds"
            AUTH_FILE="/etc/secrets/registry-push-secret/.dockerconfigjson"

            echo ">> Source image: $SRC_IMAGE"
            echo ">> Registry: $REGISTRY_ENDPOINT"
            echo ">> Authentication: $([ -f "$AUTH_FILE" ] && echo "registry secret found" || echo "no registry secret (anonymous push)")"

            if [ ! -f "/mnt/vol/app-image.tar" ]; then
              echo ">> Error: Built image tar not found at /mnt/vol/app-image.tar"
              echo ">> Hint: The build step may have failed to produce an image. Check the build step logs."
              exit 1
            fi

            mkdir -p /storage/run /storage/graph
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            EOF

            podman load -i /mnt/vol/app-image.tar

            podman tag "$SRC_IMAGE" "$REGISTRY_ENDPOINT/$SRC_IMAGE"

            echo ">> Pushing image to registry"
            if [ -f "$AUTH_FILE" ]; then
              podman push --tls-verify=true --authfile "$AUTH_FILE" "$REGISTRY_ENDPOINT/$SRC_IMAGE"
            else
              podman push --tls-verify=true "$REGISTRY_ENDPOINT/$SRC_IMAGE"
            fi

            echo ">> Image published successfully: $REGISTRY_ENDPOINT/$SRC_IMAGE"
            echo -n "$REGISTRY_ENDPOINT/$SRC_IMAGE" > /tmp/image.txt
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
          - mountPath: /etc/secrets/registry-push-secret
            name: registry-push-secret
            readOnly: true
