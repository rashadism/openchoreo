apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: ballerina-buildpack-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
        - name: app-dir
          emptyDir: {}
        # Writable scratch for buildpack generated-artifacts (not used downstream).
        - name: generated-artifacts
          emptyDir: {}
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        env:
          - name: IMAGE_NAME
            value: '{{workflow.parameters.image-name}}'
          - name: IMAGE_TAG
            value: '{{workflow.parameters.image-tag}}'
          - name: GIT_REVISION
            value: '{{inputs.parameters.git-revision}}'
          - name: APP_PATH
            value: '{{workflow.parameters.app-path}}'
          - name: BUILD_ENV_JSON
            value: '{{inputs.parameters.build-env}}'
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR=/mnt/vol/source

            IMAGE="${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"

            echo ">> Image: $IMAGE"
            echo ">> App path: $APP_PATH"

            if [ ! -d "$WORKDIR/$APP_PATH" ]; then
              echo ">> Error: The specified application path '$APP_PATH' does not exist in the repository"
              echo ">> Hint: Verify that the application path points to a valid directory in your repository."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /storage/run /storage/graph
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            EOF

            cat > /etc/containers/containers.conf <<CEOF
            [containers]
            netns="host"
            userns="host"
            ipcns="host"
            utsns="host"
            cgroupns="host"
            cgroups="disabled"
            log_driver = "k8s-file"
            [engine]
            cgroup_manager = "cgroupfs"
            events_logger="file"
            runtime="crun"
            CEOF

            echo ">> Initializing build environment"
            mkdir -p /run/podman
            podman system service --time=0 unix:///run/podman/podman.sock &
            until podman info --format '{{.Host.RemoteSocket.Exists}}' 2>/dev/null | grep -q true; do sleep 1; done
            export DOCKER_HOST=unix:///run/podman/podman.sock

            # ghcr.io/openchoreo/buildpack/ballerina:18
            BUILDER="ghcr.io/openchoreo/buildpack/ballerina@sha256:4615d47b43885210b2ae9a9b6f327cd8c10165a2d5af8e13dce6fcfefeae8a0d"
            # ghcr.io/openchoreo/buildpack/ballerina:18-run
            RUN_IMAGE="ghcr.io/openchoreo/buildpack/ballerina@sha256:121499416443e19dcb43a22e7acfa246d29427a978a43b29b5b4e7a8385b222c"

            # Build --env flags as argv entries, not shell fragments.
            set --
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              while IFS= read -r kv; do
                [ -n "$kv" ] && set -- "$@" --env "$kv"
              done <<EOF
            $(printf '%s' "$BUILD_ENV_JSON" | jq -r '.[] | "\(.name)=\(.value)"')
            EOF
            fi

            echo ">> Building image with Ballerina buildpack"
            pack build "$IMAGE" \
              --builder "$BUILDER" \
              --run-image "$RUN_IMAGE" \
              --docker-host inherit \
              --path "$WORKDIR/$APP_PATH" \
              --volume "/generated-artifacts:/app/generated-artifacts:rw" \
              --pull-policy always \
              "$@"

            echo ">> Image built successfully"
            until podman image exists "$IMAGE" 2>/dev/null; do sleep 1; done
            podman save -o /mnt/vol/app-image.tar "$IMAGE"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
          - mountPath: /app
            name: app-dir
          - mountPath: /generated-artifacts
            name: generated-artifacts
