apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: paketo-buildpacks-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR=/mnt/vol/source

            IMAGE="{{workflow.parameters.image-name}}:{{workflow.parameters.image-tag}}-{{inputs.parameters.git-revision}}"
            APP_PATH="{{workflow.parameters.app-path}}"
            BUILD_ENV_JSON='{{workflow.parameters.build-env}}'

            echo ">> Image: $IMAGE"
            echo ">> App path: $APP_PATH"

            if [ ! -d "$WORKDIR/$APP_PATH" ]; then
              echo ">> Error: The specified application path '$APP_PATH' does not exist in the repository"
              echo ">> Hint: Verify that the application path points to a valid directory in your repository."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /storage/run /storage/graph
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            EOF

            cat > /etc/containers/containers.conf <<CEOF
            [containers]
            netns="host"
            userns="host"
            ipcns="host"
            utsns="host"
            cgroupns="host"
            cgroups="disabled"
            log_driver = "k8s-file"
            [engine]
            cgroup_manager = "cgroupfs"
            events_logger="file"
            runtime="crun"
            CEOF

            echo ">> Initializing build environment"
            mkdir -p /run/podman
            podman system service --time=0 unix:///run/podman/podman.sock &
            until podman info --format '{{.Host.RemoteSocket.Exists}}' 2>/dev/null | grep -q true; do sleep 1; done
            export DOCKER_HOST=unix:///run/podman/podman.sock

            # docker.io/paketobuildpacks/builder-jammy-full:0.3.603
            BUILDER="docker.io/paketobuildpacks/builder-jammy-full@sha256:9824e8d6e79f0b01f422dfd4062347a451956a1439cfe7874c42ca88418901dc"
            # docker.io/paketobuildpacks/run-jammy-full:0.1.130
            RUN_IMG="docker.io/paketobuildpacks/run-jammy-full@sha256:84a29ab400de17994da1270742de91718658dfbe4713cae9b765f0c9e1062eac"

            # Build --env flags
            ENV_ARGS=""
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              ENV_ARGS=$(echo "$BUILD_ENV_JSON" | \
                jq -r '.[] | "--env \(.name)=\(.value)"' | \
                tr '\n' ' ')
            fi

            echo ">> Building image with Paketo buildpacks"
            pack build "$IMAGE" \
              --builder "$BUILDER" \
              --run-image "$RUN_IMG" \
              --docker-host inherit \
              --path "$WORKDIR/$APP_PATH" \
              --pull-policy always \
              $ENV_ARGS

            echo ">> Image built successfully"
            until podman image exists "$IMAGE" 2>/dev/null; do sleep 1; done
            podman save -o /mnt/vol/app-image.tar "$IMAGE"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
