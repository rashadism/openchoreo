apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: postgres
  annotations:
    openchoreo.dev/description: >-
      In-cluster PostgreSQL database backed by a single-replica StatefulSet.
      Ephemeral storage (emptyDir); for demonstration purposes only.
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        database:
          type: string
          default: appdb

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        memory:
          type: string
          default: 256Mi
        adminEnabled:
          type: boolean
          default: false

  retainPolicy: Delete

  outputs:
    - name: host
      value: "${metadata.name}.${metadata.namespace}.svc.cluster.local"
    - name: port
      value: "5432"
    - name: database
      configMapKeyRef:
        name: "${metadata.name}-config"
        key: database
    # The application user (limited grants), created at initdb by the bootstrap
    # script. Applications consume this output via Workload envBindings.
    - name: username
      configMapKeyRef:
        name: "${metadata.name}-config"
        key: username
    - name: password
      secretKeyRef:
        name: "${metadata.name}-creds"
        key: password
    # Convenience output: full Postgres connection URL with the application
    # user's password embedded. Composed on the data plane by ESO's secret
    # template; the password bytes never reach the control plane (same
    # guarantee as the `password` output). sslmode=disable matches the
    # CRT's plaintext StatefulSet config.
    - name: url
      secretKeyRef:
        name: "${metadata.name}-creds"
        key: url
    # Adminer URL with driver=pgsql, server, username=demo (deliberately weak
    # superuser created for the demo UI), db pre-filled via query params.
    # Paste the value of adminPassword on the Adminer login form.
    - name: adminURL
      value: >-
        ${environmentConfigs.adminEnabled
          ? (has(gateway.ingress.external.https)
              ? "https://" + metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + gateway.ingress.external.https.host + ":" + string(gateway.ingress.external.https.port) + "/?pgsql=" + metadata.name + "&username=demo&db=" + parameters.database
              : has(gateway.ingress.external.http)
                  ? "http://" + metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + gateway.ingress.external.http.host + ":" + string(gateway.ingress.external.http.port) + "/?pgsql=" + metadata.name + "&username=demo&db=" + parameters.database
                  : "no-gateway-configured")
          : "disabled"}
    # DEMO ONLY: literal "demo" password for the demo superuser. Used to log
    # into the admin UI. The postgres built-in superuser and the application
    # user have ESO-generated random passwords that never appear in any output.
    - name: adminPassword
      value: >-
        ${environmentConfigs.adminEnabled ? "demo" : "disabled"}

  resources:
    - id: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${metadata.name}-config
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        data:
          database: ${parameters.database}
          username: ${metadata.resourceName}-user

    # Bootstrap scripts: 01 creates the application user, 02 creates a
    # demo superuser used by the Adminer login. Both run once on initdb
    # (when the data directory is empty) in alphabetical order. The
    # superuser created by the image (postgres) is reserved for internal
    # use; its password is ESO-generated and never surfaced.
    - id: init-scripts
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${metadata.name}-init
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        data:
          01-create-app-user.sh: |
            #!/bin/bash
            set -e
            psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
              CREATE USER "$APPUSER" WITH PASSWORD '$APPUSER_PASSWORD';
              GRANT ALL ON DATABASE "$POSTGRES_DB" TO "$APPUSER";
              GRANT ALL ON SCHEMA public TO "$APPUSER";
            EOSQL
          02-create-demo-user.sh: |
            #!/bin/bash
            set -e
            psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOSQL
              CREATE USER demo WITH SUPERUSER PASSWORD 'demo';
            EOSQL

    # Postgres superuser password: generated on the data plane by ESO and
    # never written to the control plane. Used by initdb and by the init
    # scripts above; not surfaced to consumers.
    - id: password-gen-postgres
      template:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        metadata:
          name: ${metadata.name}-creds-postgres
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          length: 32
          digits: 8
          symbols: 0
          noUpper: false
          allowRepeat: true

    - id: creds-postgres
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.name}-creds-postgres
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          # Sync once. The Password generator is stateless — every call
          # returns a NEW random value, so a non-zero refreshInterval would
          # rotate the password and break the postgres user (whose password
          # is baked in at initdb).
          refreshInterval: "0"
          target:
            name: ${metadata.name}-creds-postgres
            creationPolicy: Owner
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: Password
                  name: ${metadata.name}-creds-postgres

    # Application user password: generated on the data plane by ESO and
    # never written to the control plane. Surfaced via the `password` output
    # as a secretKeyRef.
    - id: password-gen-app
      template:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        metadata:
          name: ${metadata.name}-creds
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          length: 32
          digits: 8
          symbols: 0
          noUpper: false
          allowRepeat: true

    - id: creds
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.name}-creds
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          # Sync once — see note above the `creds-postgres` ExternalSecret.
          refreshInterval: "0"
          target:
            name: ${metadata.name}-creds
            creationPolicy: Owner
            # ESO templates the Secret data DP-side using the fetched
            # password. The control plane only stores the literal `{{ .password }}`
            # placeholder, never the resolved bytes.
            template:
              type: Opaque
              data:
                password: "{{ .password }}"
                url: "postgres://${metadata.resourceName}-user:{{ .password }}@${metadata.name}.${metadata.namespace}.svc.cluster.local:5432/${parameters.database}?sslmode=disable"
          dataFrom:
            - sourceRef:
                generatorRef:
                  apiVersion: generators.external-secrets.io/v1alpha1
                  kind: Password
                  name: ${metadata.name}-creds

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          selector:
            app: ${metadata.name}
          ports:
            - name: postgres
              port: 5432
              targetPort: 5432

    - id: statefulset
      readyWhen: "${applied.statefulset.status.readyReplicas == applied.statefulset.status.replicas && applied.statefulset.status.replicas > 0}"
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          serviceName: ${metadata.name}
          replicas: 1
          selector:
            matchLabels:
              app: ${metadata.name}
          template:
            metadata:
              labels:
                app: ${metadata.name}
            spec:
              containers:
                - name: postgres
                  image: postgres:16-alpine
                  resources:
                    limits:
                      memory: ${environmentConfigs.memory}
                  env:
                    - name: POSTGRES_USER
                      value: postgres
                    - name: POSTGRES_DB
                      valueFrom:
                        configMapKeyRef:
                          name: ${metadata.name}-config
                          key: database
                    - name: POSTGRES_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: ${metadata.name}-creds-postgres
                          key: password
                    - name: APPUSER
                      valueFrom:
                        configMapKeyRef:
                          name: ${metadata.name}-config
                          key: username
                    - name: APPUSER_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: ${metadata.name}-creds
                          key: password
                    - name: PGDATA
                      value: /var/lib/postgresql/data/pgdata
                  ports:
                    - containerPort: 5432
                      name: postgres
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/postgresql/data
                    - name: init-scripts
                      mountPath: /docker-entrypoint-initdb.d
              volumes:
                - name: data
                  emptyDir: {}
                - name: init-scripts
                  configMap:
                    name: ${metadata.name}-init
                    defaultMode: 0755

    - id: admin-deployment
      includeWhen: "${environmentConfigs.adminEnabled && has(gateway.ingress.external)}"
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${metadata.name}-admin
          template:
            metadata:
              labels:
                app: ${metadata.name}-admin
            spec:
              containers:
                - name: adminer
                  image: adminer:4.8.1-standalone
                  env:
                    - name: ADMINER_DEFAULT_SERVER
                      value: ${metadata.name}
                  ports:
                    - containerPort: 8080
                      name: http

    - id: admin-service
      includeWhen: "${environmentConfigs.adminEnabled && has(gateway.ingress.external)}"
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          selector:
            app: ${metadata.name}-admin
          ports:
            - name: http
              port: 8080
              targetPort: 8080

    - id: admin-route
      includeWhen: "${environmentConfigs.adminEnabled && has(gateway.ingress.external)}"
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${metadata.name}-admin
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.resourceName + "-admin-" + metadata.environmentName + "-" + metadata.resourceNamespace + "." + h)}
          rules:
            - backendRefs:
                - name: ${metadata.name}-admin
                  port: 8080
