# OpenChoreo Workflow Templates
#
# This file is auto-generated by "make workflow-templates-gen". DO NOT EDIT.
#
# Contains the coordinator ClusterWorkflowTemplates (docker-build-step,
# pack-build-paketo, pack-build-gcp,
# pack-build-ballerina) and the generate-workload-build-step
# template. checkout-source-build-step and publish-image-build-step are
# applied separately so they can be replaced independently.
#
# Usage:
#   kubectl apply -f .../workflow-templates/checkout-source.yaml
#   kubectl apply -f .../workflow-templates.yaml
#   kubectl apply -f .../workflow-templates/publish-image.yaml
#   kubectl apply -f .../workflow-templates/generate-workload.yaml

---
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: paketo-buildpacks-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: quay.io/podman/stable:v5.8.2
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            dnf install -y --setopt=install_weak_deps=False jq > /dev/null 2>&1

            WORKDIR=/mnt/vol/source

            IMAGE="{{workflow.parameters.image-name}}:{{workflow.parameters.image-tag}}-{{inputs.parameters.git-revision}}"
            APP_PATH="{{workflow.parameters.app-path}}"
            BUILD_ENV_JSON='{{workflow.parameters.build-env}}'

            echo ">> Image: $IMAGE"
            echo ">> App path: $APP_PATH"

            if [ ! -d "$WORKDIR/$APP_PATH" ]; then
              echo ">> Error: The specified application path '$APP_PATH' does not exist in the repository"
              echo ">> Hint: Verify that the application path points to a valid directory in your repository."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /storage/run /storage/graph
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            [storage.options.overlay]
            EOF

            echo ">> Initializing build environment"
            mkdir -p /run/podman
            podman system service --time=0 unix:///run/podman/podman.sock &
            until podman info --format '{{.Host.RemoteSocket.Exists}}' 2>/dev/null | grep -q true; do sleep 1; done
            export DOCKER_HOST=unix:///run/podman/podman.sock

            BUILDER="docker.io/paketobuildpacks/builder-jammy-full:0.3.603"
            RUN_IMG="docker.io/paketobuildpacks/run-jammy-full:0.1.130"

            # Install pack CLI
            echo ">> Installing pack CLI"
            PACK_VERSION="v0.40.1"
            curl -sSL "https://github.com/buildpacks/pack/releases/download/${PACK_VERSION}/pack-${PACK_VERSION}-linux.tgz" | tar xz -C /tmp
            chmod +x /tmp/pack

            # Build --env flags
            ENV_ARGS=""
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              ENV_ARGS=$(echo "$BUILD_ENV_JSON" | \
                jq -r '.[] | "--env \(.name)=\(.value)"' | \
                tr '\n' ' ')
            fi

            echo ">> Building image with Paketo buildpacks"
            /tmp/pack build "$IMAGE" \
              --builder "$BUILDER" \
              --run-image "$RUN_IMG" \
              --docker-host inherit \
              --path "$WORKDIR/$APP_PATH" \
              --pull-policy always \
              $ENV_ARGS

            echo ">> Image built successfully"
            until podman image exists "$IMAGE" 2>/dev/null; do sleep 1; done
            podman save -o /mnt/vol/app-image.tar "$IMAGE"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage

