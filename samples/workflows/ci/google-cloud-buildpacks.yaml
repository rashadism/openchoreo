apiVersion: openchoreo.dev/v1alpha1
kind: ClusterWorkflow
metadata:
  name: google-cloud-buildpacks
  labels:
    openchoreo.dev/workflow-type: "component"
  annotations:
    openchoreo.dev/description: "Google Cloud Buildpacks workflow for auto-detecting and building applications without Dockerfiles"
spec:
  workflowPlaneRef:
    kind: ClusterWorkflowPlane
    name: default

  # Template Variable Reference (processed by WorkflowRun controller):
  # ${metadata.workflowRunName}              - Generated name for this workflow run instance
  # ${metadata.namespaceName}                - Organization namespace where the component resides
  # ${metadata.namespace}                    - Full namespace path for resource deployment
  # ${metadata.labels['key']}                - WorkflowRun labels (e.g., openchoreo.dev/project, openchoreo.dev/component)
  # ${parameters.repository.*}               - Repository parameters (url, revision, appPath, secretRef)
  # ${parameters.*}                          - Custom developer parameters defined in schema (version, testMode, cache, etc.)
  # ${externalRefs['id'].spec.*}              - Resolved external CR spec from externalRefs declarations

  # Time-to-live for completed workflow runs - Automatically cleans up workflow resources after the specified duration
  # Format is a duration string without spaces (e.g., "1d" for 1 day, "12h" for 12 hours, "10d12h30m" for 10 days, 12 hours, and 30 minutes)
  ttlAfterCompletion: "1d"

  # Schema definition for workflow parameters
  # Defines the contract between platform engineers (who create workflows) and developers (who use them)
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - repository
      $defs:
        Endpoint:
          type: object
          required:
            - name
            - port
            - type
          properties:
            name:
              type: string
            port:
              type: integer
            type:
              type: string
              enum: ["REST", "HTTP", "TCP", "UDP"]
            schemaFile:
              type: string
              description: "Path to the schema file defining the endpoint structure"
        ResourceRequirements:
          type: object
          properties:
            requests:
              $ref: "#/$defs/ResourceQuantity"
              default: {}
            limits:
              $ref: "#/$defs/ResourceQuantity"
              default: {}
        ResourceQuantity:
          type: object
          properties:
            cpu:
              type: string
              default: "100m"
            memory:
              type: string
              default: "256Mi"
      properties:
        repository:
          type: object
          description: "Git repository configuration"
          required:
            - url
          properties:
            url:
              type: string
              description: "Git repository URL"
              x-openchoreo-component-parameter-repository-url: true
            secretRef:
              type: string
              default: ""
              description: "Secret reference name for private repository Git credentials (optional for public repos)"
              x-openchoreo-component-parameter-repository-secret-ref: true
            revision:
              type: object
              default: {}
              properties:
                branch:
                  type: string
                  default: main
                  description: "Git branch to checkout"
                  x-openchoreo-component-parameter-repository-branch: true
                commit:
                  type: string
                  default: ""
                  description: "Git commit SHA or reference (optional, defaults to latest commit on branch)"
                  x-openchoreo-component-parameter-repository-commit: true
            appPath:
              type: string
              default: "."
              description: "Path to the application directory within the repository"
              x-openchoreo-component-parameter-repository-app-path: true
        version:
          type: integer
          default: 1
          description: "Build version number for image tagging"
        testMode:
          type: string
          enum: ["unit", "integration", "none"]
          default: "unit"
          description: "Test mode to execute (unit, integration, or none)"
        command:
          type: array
          items:
            type: string
          default: []
          description: "Custom command to override the default entrypoint"
        args:
          type: array
          items:
            type: string
          default: []
          description: "Custom arguments to pass to the command"
        timeout:
          type: string
          default: "30m"
          description: "Build timeout duration (e.g., 30m, 1h)"
        cache:
          type: object
          default: {}
          description: "Build cache configuration"
          properties:
            enabled:
              type: boolean
              default: true
              description: "Enable build cache to speed up subsequent builds"
            paths:
              type: array
              items:
                type: string
              default: ["/root/.cache"]
              description: "Paths to cache between builds"
        limits:
          type: object
          default: {}
          description: "Build constraint configuration"
          properties:
            maxRetries:
              type: integer
              default: 3
              minimum: 0
              maximum: 10
              description: "Maximum number of retry attempts on build failure"
            maxDurationMinutes:
              type: integer
              default: 60
              minimum: 5
              maximum: 240
              description: "Maximum build duration in minutes"
        endpoints:
          type: array
          items:
            $ref: "#/$defs/Endpoint"
          default: []
          description: "List of service endpoints exposed by the component"
        resources:
          $ref: "#/$defs/ResourceRequirements"
          default: {}
          description: "CPU and memory resource constraints for the build"

  # Workflow template that gets instantiated for each WorkflowRun
  # This generates an Argo Workflow resource in the workflow plane cluster
  runTemplate:
    apiVersion: argoproj.io/v1alpha1
    kind: Workflow
    metadata:
      name: ${metadata.workflowRunName}
      namespace: ${metadata.namespace}
    spec:
      arguments:
        parameters:
          - name: component-name
            value: ${metadata.labels['openchoreo.dev/component']}
          - name: project-name
            value: ${metadata.labels['openchoreo.dev/project']}
          - name: namespace-name
            value: ${metadata.namespaceName}
          # Parameters from repository (developer-facing)
          - name: git-repo
            value: ${parameters.repository.url}
          - name: branch
            value: ${parameters.repository.revision.branch}
          - name: commit
            value: ${parameters.repository.revision.commit}
          - name: app-path
            value: ${parameters.repository.appPath}
          # Parameters from parameters defined by PE (developer-facing)
          - name: version
            value: ${parameters.version}
          - name: test-mode
            value: ${parameters.testMode}
          - name: command
            value: ${parameters.command}
          - name: args
            value: ${parameters.args}
          - name: timeout
            value: ${parameters.timeout}
          - name: cache-enabled
            value: ${parameters.cache.enabled}
          - name: cache-paths
            value: ${parameters.cache.paths}
          - name: max-retries
            value: ${parameters.limits.maxRetries}
          - name: max-duration-minutes
            value: ${parameters.limits.maxDurationMinutes}
          - name: endpoints
            value: ${parameters.endpoints}
          - name: resources
            value: ${parameters.resources}

          # Platform Engineer-controlled parameters - Hardcoded values not exposed to developers
          # These ensure consistency and enforce organizational policies
          - name: builder-image
            value: gcr.io/buildpacks/builder@sha256:5977b4bd47d3e9ff729eefe9eb99d321d4bba7aa3b14986323133f40b622aef1
          - name: registry-url
            value: gcr.io/openchoreo-dev/images
          - name: security-scan-enabled
            value: "true"
          - name: build-timeout
            value: "30m"
          - name: image-name
            value: ${metadata.labels['openchoreo.dev/project']}-${metadata.labels['openchoreo.dev/component']}-image
          - name: image-tag
            value: v${parameters.version}
          - name: git-secret
            value: ${metadata.workflowRunName}-git-secret
          - name: registry-push-secret
            value: ${metadata.workflowRunName}-registry-push-secret
      serviceAccountName: workflow-sa
      workflowTemplateRef:
        clusterScope: true
        name: google-cloud-buildpacks

  # Additional Kubernetes resources created alongside the workflow
  # These resources are deployed to the workflow plane namespace before the workflow executes
  externalRefs:
    - id: git-secret-reference
      apiVersion: openchoreo.dev/v1alpha1
      kind: SecretReference
      name: ${parameters.repository.secretRef}

  resources:
    # Git credentials secret - Only created when secretRef is provided (for private repositories)
    # Uses External Secrets Operator to fetch credentials from the secret store (OpenBao)
    - id: git-secret
      includeWhen: ${has(parameters.repository.secretRef) && parameters.repository.secretRef != ""}
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.workflowRunName}-git-secret
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            kind: ClusterSecretStore
            name: default
          target:
            name: ${metadata.workflowRunName}-git-secret
            creationPolicy: Owner
            template:
              type: ${externalRefs['git-secret-reference'].spec.template.type}
          # CEL expression that dynamically maps data array from the resolved SecretReference CR
          # Uses oc_omit() to exclude empty property fields from the final manifest
          data: |
            ${externalRefs['git-secret-reference'].spec.data.map(secret, {
              "secretKey": secret.secretKey,
              "remoteRef": {
                "key": secret.remoteRef.key,
                "property": has(secret.remoteRef.property) && secret.remoteRef.property != "" ? secret.remoteRef.property : oc_omit()
              }
            })}

    # Container registry push credentials - Always created
    # Used to authenticate and push the built container image to the registry
    - id: registry-push-secret
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.workflowRunName}-registry-push-secret
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: default
            kind: ClusterSecretStore
          target:
            name: ${metadata.workflowRunName}-registry-push-secret
            creationPolicy: Owner
            template:
              type: kubernetes.io/dockerconfigjson
              data:
                .dockerconfigjson: "{{ .registrysecret | toString }}"
          data:
            - secretKey: registrysecret
              remoteRef:
                key: registry-push-secret
                property: value
