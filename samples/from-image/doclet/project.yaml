apiVersion: openchoreo.dev/v1alpha1
kind: Project
metadata:
  annotations:
    openchoreo.dev/description: Doclet Demo — anonymous real-time collaboration on rich-text documents
    openchoreo.dev/display-name: Doclet
  labels:
    openchoreo.dev/name: doclet
  name: doclet
  namespace: default
spec:
  deploymentPipelineRef:
    name: default
  type:
    kind: ClusterProjectType
    name: default

# ProjectReleaseBindings deploy the project to each pipeline environment and
# own its cell namespaces. spec.projectRelease is left unset; the Project
# controller seeds it once with the latest ProjectRelease.
---
apiVersion: openchoreo.dev/v1alpha1
kind: ProjectReleaseBinding
metadata:
  name: doclet-development
  namespace: default
  labels:
    openchoreo.dev/project: doclet
    openchoreo.dev/environment: development
spec:
  owner:
    projectName: doclet
  environment: development
---
apiVersion: openchoreo.dev/v1alpha1
kind: ProjectReleaseBinding
metadata:
  name: doclet-staging
  namespace: default
  labels:
    openchoreo.dev/project: doclet
    openchoreo.dev/environment: staging
spec:
  owner:
    projectName: doclet
  environment: staging
---
apiVersion: openchoreo.dev/v1alpha1
kind: ProjectReleaseBinding
metadata:
  name: doclet-production
  namespace: default
  labels:
    openchoreo.dev/project: doclet
    openchoreo.dev/environment: production
spec:
  owner:
    projectName: doclet
  environment: production
