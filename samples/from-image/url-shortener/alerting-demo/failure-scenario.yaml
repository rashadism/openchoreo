---
# Misconfigure the api-service Postgres DSN to point to a non-existent host
# This causes all DB queries to fail, returning 500s that trigger the frontend log alert
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: snip-api-service-development
  namespace: default
spec:
  owner:
    projectName: url-shortener
    componentName: snip-api-service
  environment: development
  workloadOverrides:
    container:
      env:
        - key: POSTGRES_DSN
          value: "postgres://postgres:postgres@snip-postgresss:5432/urlshortener?sslmode=disable"
