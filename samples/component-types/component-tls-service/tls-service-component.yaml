---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: demo-app-tls-service-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: demo-app-tls-service

  environment: development

  componentTypeEnvironmentConfigs:
    replicas: 1
