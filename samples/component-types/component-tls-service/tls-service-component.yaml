# Sample: TLS Service Component using the deployment/tls-service ComponentType
#
# This sample demonstrates:
# - Defining a custom ClusterComponentType that emits a Gateway API TLSRoute
# - SNI passthrough at the gateway; the workload terminates TLS with its own cert
# - Mounting a self-signed cert + nginx config into the pod via container.files

---
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  name: tls-service
  annotations:
    openchoreo.dev/description: "A long-running service exposed via Gateway API TLSRoute (SNI passthrough; the workload terminates TLS)"
spec:
  workloadType: deployment

  validations:
    - rule: "${size(workload.endpoints) > 0}"
      message: "tls-service components must have at least one endpoint."
    - rule: >-
        ${workload.endpoints.all(name, ep, ep.type in ["TCP", "HTTP", "GraphQL", "Websocket", "gRPC"])}
      message: "tls-service supports endpoint types TCP, HTTP, GraphQL, Websocket, and gRPC."
    - rule: >-
        ${workload.endpoints.exists(name, ep, "external" in ep.visibility)
          ? has(gateway.ingress) && has(gateway.ingress.external)
          : true}
      message: "Endpoints with 'external' visibility require gateway.ingress.external to be configured."

  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        replicas:
          type: integer
          default: 1
          minimum: 0
        imagePullPolicy:
          type: string
          default: IfNotPresent
          enum: [Always, IfNotPresent, Never]
        gatewaySectionName:
          type: string
          description: "Name of the Gateway listener configured with tls.mode=Passthrough."
          default: tls-passthrough

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${environmentConfigs.replicas}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${environmentConfigs.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  env: ${dependencies.toContainerEnvs()}
                  volumeMounts: ${configurations.toContainerVolumeMounts() + dependencies.toContainerVolumeMounts()}
              volumes: ${configurations.toVolumes() + dependencies.toVolumes()}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}

    - id: tlsroute-external
      forEach: '${workload.endpoints.transformMap(name, ep, "external" in ep.visibility, ep)}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1alpha2
        kind: TLSRoute
        metadata:
          name: ${oc_generate_name(metadata.componentName, endpoint.key)}
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "external", "openchoreo.dev/tls-mode": "passthrough"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
              sectionName: ${environmentConfigs.gatewaySectionName}
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https, gateway.ingress.external.?tls]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.environmentName + "-" + metadata.componentNamespace + "." + h)}
          rules:
            - backendRefs:
                - name: ${metadata.componentName}
                  port: ${endpoint.value.port}

    - id: file-config
      forEach: ${configurations.toConfigFileList()}
      var: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${config.resourceName}
          namespace: ${metadata.namespace}
        data:
          ${config.name}: |
            ${config.value}

---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: demo-app-tls-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/tls-service

---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: demo-app-tls-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: demo-app-tls-service

  endpoints:
    https:
      type: HTTP
      port: 8443
      visibility: [external]

  container:
    image: "nginx:1.27-alpine"
    files:
      - key: default.conf
        mountPath: /etc/nginx/conf.d
        value: |
          server {
            listen 8443 ssl;
            server_name _;
            ssl_certificate     /etc/nginx/certs/tls.crt;
            ssl_certificate_key /etc/nginx/certs/tls.key;

            location / {
              default_type text/plain;
              return 200 "Hello from the TLS-passthrough workload!\n";
            }
