---
# Enable the log-based alert, incident creation, AI RCA, and notification channel on the frontend
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: snip-frontend-development
  namespace: default
spec:
  owner:
    projectName: url-shortener
    componentName: snip-frontend
  environment: development
  traitEnvironmentConfigs:
    frontend-5xx-log-alert:
      enabled: true
      actions:
        notifications:
          channels:
            - "webhook-notification-channel-development"
        incident:
          enabled: true
          triggerAiRca: true
