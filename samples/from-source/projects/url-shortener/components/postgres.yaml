apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: snip-postgres
  namespace: default
spec:
  owner:
    projectName: url-shortener

  componentType:
    kind: ClusterComponentType
    name: deployment/service

  autoDeploy: true

  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: "https://github.com/openchoreo/sample-workloads"
        revision:
          branch: "main"
        appPath: "/project-url-shortener/db"
      docker:
        context: "/project-url-shortener/db"
        filePath: "/project-url-shortener/db/Dockerfile"

---
apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: snip-postgres-build-01
  labels:
    openchoreo.dev/project: "url-shortener"
    openchoreo.dev/component: "snip-postgres"
spec:
  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: "https://github.com/openchoreo/sample-workloads"
        revision:
          branch: "main"
        appPath: "/project-url-shortener/db"
      docker:
        context: "/project-url-shortener/db"
        filePath: "/project-url-shortener/db/Dockerfile"
