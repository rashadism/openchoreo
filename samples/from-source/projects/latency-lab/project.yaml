apiVersion: openchoreo.dev/v1alpha1
kind: Project
metadata:
  annotations:
    openchoreo.dev/description: Latency Lab — multi-service notes app (frontend, api, auth, analytics, postgres, redis) with conditional latency / fault injection for observability and alerting demos
    openchoreo.dev/display-name: Latency Lab
  labels:
    openchoreo.dev/name: latency-lab
  name: latency-lab
  namespace: default
spec:
  deploymentPipelineRef:
    name: default
  type:
    kind: ClusterProjectType
    name: default

# ProjectReleaseBindings deploy the project to each pipeline environment and
# own its cell namespaces. spec.projectRelease is left unset; the Project
# controller seeds it once with the latest ProjectRelease.
---
apiVersion: openchoreo.dev/v1alpha1
kind: ProjectReleaseBinding
metadata:
  name: latency-lab-development
  namespace: default
  labels:
    openchoreo.dev/project: latency-lab
    openchoreo.dev/environment: development
spec:
  owner:
    projectName: latency-lab
  environment: development
---
apiVersion: openchoreo.dev/v1alpha1
kind: ProjectReleaseBinding
metadata:
  name: latency-lab-staging
  namespace: default
  labels:
    openchoreo.dev/project: latency-lab
    openchoreo.dev/environment: staging
spec:
  owner:
    projectName: latency-lab
  environment: staging
---
apiVersion: openchoreo.dev/v1alpha1
kind: ProjectReleaseBinding
metadata:
  name: latency-lab-production
  namespace: default
  labels:
    openchoreo.dev/project: latency-lab
    openchoreo.dev/environment: production
spec:
  owner:
    projectName: latency-lab
  environment: production
