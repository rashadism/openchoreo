apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: react-starter-from-source
  namespace: default
spec:
  owner:
    projectName: default

  componentType:
    kind: ClusterComponentType
    name: deployment/web-application

  autoDeploy: true

  workflow:
    kind: ClusterWorkflow
    name: paketo-buildpacks-builder
    parameters:
      repository:
        url: "https://github.com/openchoreo/sample-workloads"
        revision:
          branch: "main"
        appPath: "/webapp-react-nginx"
      buildEnv:
        - name: BP_NODE_RUN_SCRIPTS
          value: "build"
        - name: BP_WEB_SERVER
          value: "nginx"
        - name: BP_WEB_SERVER_ROOT
          value: "build"
        - name: BP_WEB_SERVER_ENABLE_PUSH_STATE
          value: "true"
        - name: PORT # Overrides listening port. paketo-buildpack/nginx defaults to 8080
          value: "80"

---
apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: react-starter-build-01
  labels:
    openchoreo.dev/project: "default"
    openchoreo.dev/component: "react-starter-from-source"
spec:
  workflow:
    kind: ClusterWorkflow
    name: paketo-buildpacks-builder
    parameters:
      repository:
        url: "https://github.com/openchoreo/sample-workloads"
        revision:
          branch: "main"
        appPath: "/webapp-react-nginx"
      buildEnv:
        - name: BP_NODE_RUN_SCRIPTS
          value: "build"
        - name: BP_WEB_SERVER
          value: "nginx"
        - name: BP_WEB_SERVER_ROOT
          value: "build"
        - name: BP_WEB_SERVER_ENABLE_PUSH_STATE
          value: "true"
        - name: PORT
          value: "80"
