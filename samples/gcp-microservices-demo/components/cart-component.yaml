apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: cart
  namespace: default
spec:
  owner:
    projectName: gcp-microservice-demo

  componentType:
    kind: ClusterComponentType
    name: deployment/service
  autoDeploy: true

---

apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: cart
  namespace: default
spec:
  owner:
    componentName: cart
    projectName: gcp-microservice-demo
  endpoints:
    grpc:
      type: gRPC
      port: 7070
  dependencies:
    resources:
      - ref: redis
        envBindings:
          connectionString: REDIS_ADDR
  container:
    image: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice:v0.10.5
    env:
      - key: PORT
        value: "7070"
