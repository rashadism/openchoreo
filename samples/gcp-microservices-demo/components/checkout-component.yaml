apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: checkout
  namespace: default
spec:
  owner:
    projectName: gcp-microservice-demo

  componentType:
    kind: ClusterComponentType
    name: deployment/service
  autoDeploy: true

---

apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: checkout
  namespace: default
spec:
  owner:
    componentName: checkout
    projectName: gcp-microservice-demo
  endpoints:
    grpc:
      type: gRPC
      port: 5050
  dependencies:
    endpoints:
      - project: gcp-microservice-demo
        component: productcatalog
        name: grpc
        visibility: project
        envBindings:
          address: PRODUCT_CATALOG_SERVICE_ADDR
      - project: gcp-microservice-demo
        component: shipping
        name: grpc
        visibility: project
        envBindings:
          address: SHIPPING_SERVICE_ADDR
      - project: gcp-microservice-demo
        component: payment
        name: grpc
        visibility: project
        envBindings:
          address: PAYMENT_SERVICE_ADDR
      - project: gcp-microservice-demo
        component: email
        name: grpc
        visibility: project
        envBindings:
          address: EMAIL_SERVICE_ADDR
      - project: gcp-microservice-demo
        component: currency
        name: grpc
        visibility: project
        envBindings:
          address: CURRENCY_SERVICE_ADDR
      - project: gcp-microservice-demo
        component: cart
        name: grpc
        visibility: project
        envBindings:
          address: CART_SERVICE_ADDR
  container:
    image: us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice:v0.10.5
    env:
      - key: DISABLE_PROFILER
        value: "1"
      - key: PORT
        value: "5050"
