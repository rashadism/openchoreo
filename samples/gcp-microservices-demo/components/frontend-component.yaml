apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: frontend
  namespace: default
spec:
  owner:
    projectName: gcp-microservice-demo

  componentType:
    kind: ComponentType
    name: deployment/web-application
  autoDeploy: true

---

apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: frontend
  namespace: default
spec:
  owner:
    componentName: frontend
    projectName: gcp-microservice-demo
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [external]
  connections:
    - project: gcp-microservice-demo
      component: ad
      endpoint: grpc
      visibility: project
      envBindings:
        address: AD_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: cart
      endpoint: grpc
      visibility: project
      envBindings:
        address: CART_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: checkout
      endpoint: grpc
      visibility: project
      envBindings:
        address: CHECKOUT_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: currency
      endpoint: grpc
      visibility: project
      envBindings:
        address: CURRENCY_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: payment
      endpoint: grpc
      visibility: project
      envBindings:
        address: PAYMENT_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: recommendation
      endpoint: grpc
      visibility: project
      envBindings:
        address: RECOMMENDATION_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: shipping
      endpoint: grpc
      visibility: project
      envBindings:
        address: SHIPPING_SERVICE_ADDR
    - project: gcp-microservice-demo
      component: productcatalog
      endpoint: grpc
      visibility: project
      envBindings:
        address: PRODUCT_CATALOG_SERVICE_ADDR
  container:
    image: us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend:v0.10.3
    env:
      - key: DISABLE_PROFILER
        value: "1"
      - key: PORT
        value: "8080"
      - key: SHOPPING_ASSISTANT_SERVICE_ADDR
        value: "-" # We don't deploy this service. See https://github.com/GoogleCloudPlatform/microservices-demo/blob/main/helm-chart/values.yaml#L218
      - key: CYMBAL_BRANDING
        value: "false"
      - key: FRONTEND_MESSAGE
        value: "Welcome to the Microservices Demo!"
      - key: ENABLE_ASSISTANT
        value: "false"
