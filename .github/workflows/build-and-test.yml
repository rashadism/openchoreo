name: Build and Test
on:
  push:
    branches:
      - "main"
      - "release-v*"
  pull_request:
    branches:
      - "main"
      - "release-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE_PLATFORMS: ${{ github.event_name == 'push' && 'linux/amd64 linux/arm64' || 'linux/amd64' }}
  CLI_EXTRA_PLATFORMS: ${{ github.event_name == 'push' && 'darwin/amd64 darwin/arm64 windows/amd64 windows/arm64' || '' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run linter
        run: make lint

  gen-check:
    name: Code Generation
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run Code Generation Checks
        run: make code.gen-check

  test:
    name: Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # Required for Codecov OIDC
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Running Tests
        run: |
          make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./cover.out
          fail_ci_if_error: ${{ github.event_name == 'push' }}
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Build multiarch binaries
        run: |
          make go.build-multiarch GO_TARGET_PLATFORMS="${{ env.IMAGE_PLATFORMS }}"

          # Build occ for extra platforms (push only)
          if [[ -n "${{ env.CLI_EXTRA_PLATFORMS }}" ]]; then
            make go.build-multiarch.occ GO_TARGET_PLATFORMS="${{ env.CLI_EXTRA_PLATFORMS }}"
          fi

      - name: Upload occ binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: occ
          path: bin/dist/**/occ

      - name: Upload manager binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manager
          path: bin/dist/**/manager

      - name: Upload openchoreo-api binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openchoreo-api
          path: bin/dist/**/openchoreo-api

      - name: Upload observer binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: observer
          path: bin/dist/**/observer

      - name: Upload event-forwarder binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: event-forwarder
          path: bin/dist/**/event-forwarder

      - name: Upload cluster-gateway binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cluster-gateway
          path: bin/dist/**/cluster-gateway

      - name: Upload cluster-agent binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cluster-agent
          path: bin/dist/**/cluster-agent

  finops-agent-test:
    name: FinOps Agent (Python)
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: agents/finops-agent/uv.lock

      - name: Run tests
        working-directory: agents/finops-agent
        # uv reads .python-version (3.14) and provisions the interpreter.
        # ruff lint/format is intentionally deferred until the pre-existing
        # src/ debt is cleaned up; this job gates on pytest only for now.
        run: |
          uv sync --frozen --group dev
          uv run --frozen pytest -q

  publish:
    name: ${{ github.event_name == 'push' && 'Publish' || 'Verify Packaging' }}
    runs-on: ubuntu-24.04
    needs: [ lint, gen-check, test, build, finops-agent-test ]
    permissions:
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Download occ binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: occ
          path: bin/dist

      - name: Download manager binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: manager
          path: bin/dist

      - name: Download openchoreo-api binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openchoreo-api
          path: bin/dist

      - name: Download observer binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: observer
          path: bin/dist

      - name: Download event-forwarder binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: event-forwarder
          path: bin/dist

      - name: Download cluster-gateway binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cluster-gateway
          path: bin/dist

      - name: Download cluster-agent binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cluster-agent
          path: bin/dist

      - name: Set executable permissions
        # See: https://github.com/actions/download-artifact/issues/14
        run: find bin/dist -type f -exec chmod +x {} +
          
      - name: Login to GitHub container registry
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup docker multiarch
        if: github.event_name == 'push'
        run: make docker.setup-multiarch

      - name: Set commit SHA
        if: github.event_name == 'push'
        run: echo "GIT_SHA_SHORT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Check if commit images already exist
        if: github.event_name == 'push'
        id: check-images
        run: |
          SHA=$(git rev-parse --short=8 HEAD)
          ALL_EXIST=true
          for IMG in controller quick-start openchoreo-api observer event-forwarder sre-agent finops-agent portal-assistant openchoreo-cli cluster-gateway cluster-agent; do
            if docker buildx imagetools inspect "ghcr.io/openchoreo/${IMG}:${SHA}" >/dev/null 2>&1; then
              echo "  ✅ ${IMG}:${SHA} exists"
            else
              echo "  ❌ ${IMG}:${SHA} not found"
              ALL_EXIST=false
            fi
          done
          if [ "$ALL_EXIST" = "true" ]; then
            echo "All ${SHA} images exist. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push images and helm charts
        if: github.event_name == 'push' && steps.check-images.outputs.skip != 'true'
        run: |
          echo "Building and pushing Docker images with tag ${{ env.GIT_SHA_SHORT }}..."
          make docker.push-multiarch TAG=${{ env.GIT_SHA_SHORT }}

          # Retag images as latest-dev for main branch only
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            make docker.retag-registry SOURCE_TAG=${{ env.GIT_SHA_SHORT }} NEW_TAG=latest-dev
          fi

          # Package and push Helm charts
          echo "Packaging and pushing Helm charts with SHA ${{ env.GIT_SHA_SHORT }}..."
          make helm-push TAG=${{ env.GIT_SHA_SHORT }} HELM_CHART_VERSION=0.0.0-${{ env.GIT_SHA_SHORT }}

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            make helm-push TAG=latest-dev HELM_CHART_VERSION=0.0.0-latest-dev
          fi

      - name: Package helm charts for PR verification
        if: github.event_name != 'push'
        run: make helm-package
