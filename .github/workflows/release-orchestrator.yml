name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'full (branch+tag), branch, tag'
        required: true
        type: choice
        options:
          - full
          - branch
          - tag
      major:
        description: 'Major version'
        required: true
        type: number
      minor:
        description: 'Minor version'
        required: true
        type: number
      patch:
        description: 'Patch version'
        required: true
        type: number
      pre_release_id:
        description: 'Prerelease identifier (e.g. rc.1, beta.2)'
        required: false
        type: string
      commit_sha:
        description: 'Explicit commit SHA to tag (overrides automatic resolution)'
        required: false
        type: string

concurrency:
  group: release-orchestrator-${{ github.event.inputs.major }}-${{ github.event.inputs.minor }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------
  # Validate: resolve inputs, check preconditions, poll for images.
  # Always runs; outputs computed values consumed by branch and tag.
  # ----------------------------------------------------------------
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      release-tag: ${{ steps.resolve-version.outputs.release-tag }}
      release-version: ${{ steps.resolve-version.outputs.release-version }}
      target-commit: ${{ steps.determine-commit.outputs.target-commit }}
      checkout-sha: ${{ steps.resolve-version.outputs.checkout-sha }}
      branch-exists: ${{ steps.check-branch.outputs.branch-exists }}
      prerelease: ${{ steps.resolve-version.outputs.prerelease }}
      release-branch: ${{ steps.resolve-version.outputs.release-branch }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.OC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.OC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Resolve version
        id: resolve-version
        env:
          IN_MAJOR: ${{ github.event.inputs.major }}
          IN_MINOR: ${{ github.event.inputs.minor }}
          IN_PATCH: ${{ github.event.inputs.patch }}
          IN_PRERELEASE: ${{ github.event.inputs.pre_release_id || '' }}
        run: |
          MAJOR="$IN_MAJOR"
          MINOR="$IN_MINOR"
          PATCH="$IN_PATCH"
          PRERELEASE="$IN_PRERELEASE"

          if [[ ! "$MAJOR" =~ ^[0-9]+$ ]] || [[ ! "$MINOR" =~ ^[0-9]+$ ]] || [[ ! "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::major, minor, patch must be numbers"
            exit 1
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          if [ -n "$PRERELEASE" ]; then
            if [[ ! "$PRERELEASE" =~ ^[a-zA-Z0-9.-]+$ ]]; then
              echo "::error::Invalid prerelease identifier: ${PRERELEASE}"
              exit 1
            fi
            VERSION="${VERSION}-${PRERELEASE}"
            RELEASE_BRANCH="release-v${VERSION}"
          else
            RELEASE_BRANCH="release-v${MAJOR}.${MINOR}"
          fi

          TAG="v${VERSION}"
          echo "MAJOR=${MAJOR}" >> $GITHUB_ENV
          echo "MINOR=${MINOR}" >> $GITHUB_ENV
          echo "PRERELEASE=${PRERELEASE}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
          echo "release-tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release-version=${VERSION}" >> $GITHUB_OUTPUT
          echo "checkout-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "release-branch=${RELEASE_BRANCH}" >> $GITHUB_OUTPUT

      - name: Validate VERSION file
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '\n\r')
          if [ "${FILE_VERSION}" != "${{ env.VERSION }}" ]; then
            echo "::error::VERSION file contains '${FILE_VERSION}', expected '${{ env.VERSION }}'"
            exit 1
          fi

      - name: Check for existing tag
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'tag' }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if git ls-remote --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists on remote. Remove it first if you want to retag."
            exit 1
          fi

      - name: Check if release branch exists
        id: check-branch
        run: |
          if git ls-remote --exit-code origin "refs/heads/${{ steps.resolve-version.outputs.release-branch }}" 2>/dev/null; then
            echo "branch-exists=true" >> $GITHUB_OUTPUT
            echo "BRANCH_EXISTS=true" >> $GITHUB_ENV
          else
            echo "branch-exists=false" >> $GITHUB_OUTPUT
            echo "BRANCH_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Determine commit to tag
        id: determine-commit
        env:
          IN_COMMIT_SHA: ${{ github.event.inputs.commit_sha || '' }}
          ACTION: ${{ github.event.inputs.action }}
          CHECKOUT_SHA: ${{ steps.resolve-version.outputs.checkout-sha }}
        run: |
          COMMIT_SHA="$IN_COMMIT_SHA"

          if [ -n "$COMMIT_SHA" ]; then
            if ! git rev-parse --verify "${COMMIT_SHA}^{commit}" >/dev/null 2>&1; then
              echo "::error::Provided commit_sha ${COMMIT_SHA} does not exist in the repository."
              exit 1
            fi
            TARGET="${COMMIT_SHA}"
            echo "Target: provided commit_sha (${TARGET})"

          elif [[ "$ACTION" == "full" || "$ACTION" == "branch" ]] && [[ "$BRANCH_EXISTS" == "false" ]]; then
            # Branch will be created from checkout-sha. Use it as the image pre-check target
            # since images exist there. The tag job re-resolves the branch tip after creation
            # and waits for its images (including any URL-update commit on stable releases).
            TARGET="${CHECKOUT_SHA}"
            echo "Target (pre-check): pre-branch-creation HEAD (${TARGET})"

          elif [ "$BRANCH_EXISTS" = "true" ]; then
            TARGET=$(git ls-remote origin "refs/heads/${{ steps.resolve-version.outputs.release-branch }}" | awk '{print $1}')
            echo "Target: HEAD of ${{ steps.resolve-version.outputs.release-branch }} (${TARGET})"

          else
            TARGET="${CHECKOUT_SHA}"
            echo "Target: current HEAD (${TARGET})"
          fi

          echo "target-commit=${TARGET}" >> $GITHUB_OUTPUT
          echo "TARGET_COMMIT=${TARGET}" >> $GITHUB_ENV

      - name: Login to GitHub container registry
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'tag' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-validate source images exist for target commit
        if: ${{ github.event.inputs.action == 'full' || github.event.inputs.action == 'tag' }}
        run: |
          SHA=$(git rev-parse --short=8 "${{ env.TARGET_COMMIT }}")
          echo "Checking images for commit: ${SHA}"

          # Poll for up to 30 minutes (60s intervals) waiting for the image to appear
          for i in $(seq 1 30); do
            if docker buildx imagetools inspect "ghcr.io/openchoreo/controller:${SHA}" >/dev/null 2>&1; then
              echo "Images verified for commit: ${SHA} (after ${i} attempt(s))"
              exit 0
            fi
            echo "Attempt ${i}/30 — image not found yet. Waiting 60 seconds..."
            sleep 60
          done

          echo "::error::Image ghcr.io/openchoreo/controller:${SHA} not found after 30 minutes."
          echo "::error::build-and-test may still be running or may have failed."
          echo "::error::Check the build status and retry."
          exit 1

  # ----------------------------------------------------------------
  # Branch: create release-vX.Y or prerelease branch from checkout-sha.
  # Only runs when validate finds no existing release branch.
  # ----------------------------------------------------------------
  branch:
    needs: [validate]
    if: ${{ needs.validate.outputs.branch-exists == 'false' && (github.event.inputs.action == 'full' || github.event.inputs.action == 'branch') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.OC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.OC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ needs.validate.outputs.checkout-sha }}
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Create release branch
        run: |
          BRANCH="${{ needs.validate.outputs.release-branch }}"

          git checkout -b "${BRANCH}"

          if [ -z "${{ needs.validate.outputs.prerelease }}" ]; then
            # Update sample URLs to point to the release branch instead of main
            find samples/ \( -name "*.md" -o -name "*.yaml" \) \
              -exec sed -i \
                -e 's|/openchoreo/openchoreo/main/|/openchoreo/openchoreo/'"${BRANCH}"'/|g' \
                -e 's|/refs/heads/main/|/refs/heads/'"${BRANCH}"'/|g' \
                -e 's|/openchoreo/openchoreo/blob/main/|/openchoreo/openchoreo/blob/'"${BRANCH}"'/|g' {} +

            git add -u
            if ! git diff --cached --quiet; then
              git commit -s -m "chore: update sample URLs to ${BRANCH}"
            fi
          fi

          git push origin "${BRANCH}"
          echo "Pushed branch: ${BRANCH}"

  # ----------------------------------------------------------------
  # Tag: create and push the annotated release tag at the release branch tip.
  # always() allows this to run even when branch is skipped (action=tag
  # or branch already exists). !failure() prevents tagging after errors.
  # ----------------------------------------------------------------
  tag:
    needs: [validate, branch]
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.action == 'full' || github.event.inputs.action == 'tag') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.OC_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.OC_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ needs.validate.outputs.checkout-sha }}
          fetch-depth: 0

      - name: Resolve release branch tip
        id: resolve-target
        env:
          COMMIT_SHA_OVERRIDE: ${{ github.event.inputs.commit_sha || '' }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.release-branch }}
          VALIDATE_TARGET: ${{ needs.validate.outputs.target-commit }}
        run: |
          if [ -n "$COMMIT_SHA_OVERRIDE" ]; then
            # Explicit SHA provided; use it directly (already validated and polled in validate).
            TARGET="$VALIDATE_TARGET"
            echo "Target: explicit commit_sha (${TARGET})"
          else
            # Always resolve the release branch tip so the tag points to the actual released
            # state, including any URL-update commit added by the branch job.
            git fetch origin "refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}" 2>/dev/null || true
            BRANCH_TIP=$(git rev-parse "origin/${RELEASE_BRANCH}" 2>/dev/null || echo "")
            if [ -n "$BRANCH_TIP" ]; then
              TARGET="$BRANCH_TIP"
              echo "Target: HEAD of ${RELEASE_BRANCH} (${TARGET})"
            else
              TARGET="$VALIDATE_TARGET"
              echo "Target: validate fallback — ${RELEASE_BRANCH} not found (${TARGET})"
            fi
          fi
          echo "target=${TARGET}" >> $GITHUB_OUTPUT

      - name: Login to GitHub container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for images at target commit
        run: |
          SHA=$(git rev-parse --short=8 "${{ steps.resolve-target.outputs.target }}")
          echo "Waiting for images at ${SHA}"
          for i in $(seq 1 30); do
            if docker buildx imagetools inspect "ghcr.io/openchoreo/controller:${SHA}" >/dev/null 2>&1; then
              echo "Images verified for commit: ${SHA} (after ${i} attempt(s))"
              exit 0
            fi
            echo "Attempt ${i}/30 — image not found yet. Waiting 60 seconds..."
            sleep 60
          done
          echo "::error::Images not found for ${SHA} after 30 minutes."
          echo "::error::build-and-test may still be running or may have failed."
          exit 1

      - name: Set git identity
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ needs.validate.outputs.release-tag }}"
          TARGET="${{ steps.resolve-target.outputs.target }}"
          VERSION="${{ needs.validate.outputs.release-version }}"
          git tag -a "${TAG}" -m "Release ${VERSION}" "${TARGET}"
          git push origin "${TAG}"
          echo "Tag pushed: ${TAG} (commit: ${TARGET})"
