name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  K3D_VERSION: v5.8.3
  K3D_SHA256: dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e
  YQ_VERSION: v4.45.4
  YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69

jobs:
  # In the release job, try to use artifacts from the build job as much as possible
  # to keep the release deterministic. This will ensure the release includes the tested artifacts.
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write # Required for Cosign keyless signing via GitHub OIDC
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set commit SHA and release tag
        run: |
          echo "GIT_SHA_SHORT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "GIT_SHA_LONG=$(git rev-parse HEAD)" >> $GITHUB_ENV
          RELEASE_TAG=$(echo ${GITHUB_REF##*/})
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "RELEASE_TAG_WITHOUT_V=$(echo ${GITHUB_REF##*/v})" >> $GITHUB_ENV
          # Detect prerelease versions (SemVer tags containing a hyphen, e.g., v1.0.0-rc.1)
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Set Latest Flag
        run: |
          git fetch --tags --force
          latest_tag=$(git tag -l | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
            if [ "$latest_tag" == "${RELEASE_TAG}" ]; then
                echo "LATEST=true" >> $GITHUB_ENV
            else
                echo "LATEST=false" >> $GITHUB_ENV
            fi

      - name: Validate VERSION file
        run: |
          VERSION=$(cat VERSION)
          if [ "${VERSION}" != "${{ env.RELEASE_TAG_WITHOUT_V }}" ]; then
            echo "VERSION file value '${VERSION}' does not match the release tag '${{ env.RELEASE_TAG_WITHOUT_V }}'"
            echo "The VERSION file should contain the tag version without the leading 'v'."
            echo "Please update the VERSION file to match the release tag."
            exit 1
          fi

      - name: Login to GitHub container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push existing images
        run: |
          make docker.retag-registry SOURCE_TAG=${{ env.GIT_SHA_SHORT }} NEW_TAG=${{ env.RELEASE_TAG }}

          # TODO: Move latest tagging to a separate workflow to have more manual control
          if [ "${{ env.LATEST }}" == "true" ]; then
              make docker.retag-registry SOURCE_TAG=${{ env.RELEASE_TAG }} NEW_TAG=latest
          fi

      # Sign all container images by digest using Cosign keyless signing.
      # If adding a new image to DOCKER_BUILD_IMAGES in make/docker.mk, add it here too.
      - name: Sign container images
        run: |
          IMAGES=(
            controller
            quick-start
            openchoreo-api
            observer
            event-forwarder
            sre-agent
            finops-agent
            portal-assistant
            openchoreo-cli
            cluster-gateway
            cluster-agent
          )
          for image in "${IMAGES[@]}"; do
            FULL_REF="ghcr.io/openchoreo/${image}:${{ env.RELEASE_TAG }}"
            DIGEST=$(docker buildx imagetools inspect "${FULL_REF}" --format '{{json .Manifest}}' | jq -r '.digest')
            if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "null" ]; then
              echo "ERROR: Failed to resolve digest for ${FULL_REF}"
              exit 1
            fi
            echo "Signing ${FULL_REF} (${DIGEST})"
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              "ghcr.io/openchoreo/${image}@${DIGEST}"
          done

      - name: Download occ artifact from the build workflow
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: build-and-test.yml
          commit: ${{ env.GIT_SHA_LONG }}
          event: push
          name: occ
          path: bin/dist

      - name: Set executable permissions
        run: |
          chmod +x bin/dist/linux/amd64/occ
          chmod +x bin/dist/linux/arm64/occ
          chmod +x bin/dist/darwin/amd64/occ
          chmod +x bin/dist/darwin/arm64/occ

      - name: Package the occ binaries
        run: |
          make go.package.occ

      - name: Generate checksums
        run: |
          cd bin/dist
          for f in \
            linux/amd64/occ_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz \
            linux/arm64/occ_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz \
            darwin/amd64/occ_${{ env.RELEASE_TAG }}_darwin_amd64.tar.gz \
            darwin/arm64/occ_${{ env.RELEASE_TAG }}_darwin_arm64.tar.gz \
            windows/amd64/occ_${{ env.RELEASE_TAG }}_windows_amd64.zip \
            windows/arm64/occ_${{ env.RELEASE_TAG }}_windows_arm64.zip; do
            (cd "$(dirname "$f")" && sha256sum "$(basename "$f")")
          done > checksums.txt

      - name: Sign CLI binaries and checksums
        run: |
          cd bin/dist
          FILES=(
            linux/amd64/occ_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz
            linux/arm64/occ_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz
            darwin/amd64/occ_${{ env.RELEASE_TAG }}_darwin_amd64.tar.gz
            darwin/arm64/occ_${{ env.RELEASE_TAG }}_darwin_arm64.tar.gz
            windows/amd64/occ_${{ env.RELEASE_TAG }}_windows_amd64.zip
            windows/arm64/occ_${{ env.RELEASE_TAG }}_windows_arm64.zip
            checksums.txt
          )
          for file in "${FILES[@]}"; do
            echo "Signing ${file}"
            cosign sign-blob --yes \
              --bundle "${file}.sigstore.json" \
              "${file}"
          done

      - name: Package and push helm charts
        run: |
          make helm-push HELM_CHART_VERSION=${{ env.RELEASE_TAG_WITHOUT_V }} TAG=${{ env.RELEASE_TAG }} HELM_CONTROLLER_IMAGE_PULL_POLICY=IfNotPresent

      - name: Upload GitHub release artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            bin/dist/linux/amd64/occ_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz
            bin/dist/linux/amd64/occ_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz.sigstore.json
            bin/dist/linux/arm64/occ_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz
            bin/dist/linux/arm64/occ_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz.sigstore.json
            bin/dist/darwin/amd64/occ_${{ env.RELEASE_TAG }}_darwin_amd64.tar.gz
            bin/dist/darwin/amd64/occ_${{ env.RELEASE_TAG }}_darwin_amd64.tar.gz.sigstore.json
            bin/dist/darwin/arm64/occ_${{ env.RELEASE_TAG }}_darwin_arm64.tar.gz
            bin/dist/darwin/arm64/occ_${{ env.RELEASE_TAG }}_darwin_arm64.tar.gz.sigstore.json
            bin/dist/windows/amd64/occ_${{ env.RELEASE_TAG }}_windows_amd64.zip
            bin/dist/windows/amd64/occ_${{ env.RELEASE_TAG }}_windows_amd64.zip.sigstore.json
            bin/dist/windows/arm64/occ_${{ env.RELEASE_TAG }}_windows_arm64.zip
            bin/dist/windows/arm64/occ_${{ env.RELEASE_TAG }}_windows_arm64.zip.sigstore.json
            bin/dist/checksums.txt
            bin/dist/checksums.txt.sigstore.json

  # Post-release smoke test: validate the published images and Helm chart work
  # with an external OIDC provider (Dex). Runs after the release job pushes the
  # release-tagged chart and images, so the smoke test exercises the exact
  # artifacts that users will install. This is a safety net for direct tag pushes
  # that bypass the release-orchestrator pre-release e2e gate.
  ext-idp-smoke:
    name: Smoke (External IdP)
    needs: [release]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      E2E_WITH_UI: "true"
      E2E_WITH_EXT_IDP: "true"
      E2E_KUBECONTEXT: k3d-openchoreo-e2e
      UI_BASE_URL: http://openchoreo.e2e-cp.local:28080

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check UI suite presence
        # Older release branches predate the Playwright suite; skip gracefully.
        id: ui-suite
        run: |
          if [ -f test/ui/package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::test/ui is not present at this ref; skipping ext-idp smoke"
          fi

      - name: Setup Go
        if: steps.ui-suite.outputs.present == 'true'
        uses: ./.github/actions/setup-go

      - name: Setup Node
        if: steps.ui-suite.outputs.present == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: test/ui/package-lock.json

      - name: Install k3d
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/${{ env.K3D_VERSION }}/k3d-linux-amd64
          echo "${{ env.K3D_SHA256 }}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          echo "${{ env.YQ_SHA256 }}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Map e2e hostnames
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          echo "127.0.0.1 openchoreo.e2e-cp.local api.e2e-cp.local dex.e2e-cp.local" | sudo tee -a /etc/hosts

      - name: Install UI test dependencies
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npm ci

      - name: Install Playwright browsers
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npx playwright install --with-deps chromium

      - name: Derive Helm chart version from tag
        # GITHUB_REF_NAME is the tag name (e.g. v1.2.3); strip the leading "v".
        id: helm-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install OpenChoreo e2e cluster with Dex
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          make e2e.setup \
            E2E_HELM_SOURCE=oci \
            HELM_CHART_VERSION="${{ steps.helm-version.outputs.version }}" \
            E2E_WITH_UI=true \
            E2E_WITH_EXT_IDP=true \
            E2E_SETUP_TIMEOUT=10m

      - name: Run ext-idp Playwright tests
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npm test

      - name: Collect e2e diagnostics
        if: failure()
        run: make e2e.diagnostics || true

      - name: Upload e2e diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ext-idp-smoke-diagnostics
          path: test/e2e/_diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ext-idp-smoke-playwright-report
          path: test/ui/_report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ext-idp-smoke-test-results
          path: test/ui/_test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Delete e2e cluster
        if: always()
        run: make e2e.down || true
