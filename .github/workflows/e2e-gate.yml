# The e2e workflow that shards the suite into independent legs, one
# runner + k3d cluster each, so a run pays the wall-clock of the slowest
# leg instead of the serial sum:
#   tier1, tier2 — control plane + data plane only
#   tier3       — multi-cluster (4 separate k3d clusters, one per plane)
#   ui          — full stack + Backstage portal (Playwright)
#   ext-idp     — full stack + Backstage portal with Dex as external OIDC provider (Playwright)
#   quick-start — published quick-start container, the documented Quick Start
#                 Guide journey (all four planes + sample deploy)
#
# Triggers:
#   schedule        — nightly at 01:00 UTC; runs EVERY leg. This is the single
#                     consolidated nightly e2e run — there are no per-suite
#                     scheduled wrapper workflows.
#   workflow_dispatch — manual pre-flight of a branch, with per-leg run_*
#                     toggles (e.g. before starting a release).
#   workflow_call   — the release-orchestrator e2e gate, at the release ref.

name: E2E Gate

on:
  schedule:
    - cron: "0 1 * * *" # nightly at 01:00 UTC (06:30 IST); runs every leg
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out and test: full 40-char commit SHA, branch, or tag (actions/checkout can't resolve an abbreviated SHA); defaults to the dispatched branch"
        required: false
        type: string
        default: ""
      helm_chart_version:
        description: "Helm chart version (e.g., 0.0.0-latest-dev or 0.0.0-<8-char-short-sha>)"
        required: false
        type: string
        default: "0.0.0-latest-dev"
      backstage_image_tag:
        description: "Backstage (openchoreo-ui) image tag for the UI leg, e.g. the backstage-plugins commit's 8-char short SHA or 'latest-dev'; empty uses the chart's AppVersion default"
        required: false
        type: string
        default: ""
      run_tier1:
        description: "Run the tier1 leg"
        required: false
        type: boolean
        default: true
      run_tier2:
        description: "Run the tier2 leg"
        required: false
        type: boolean
        default: true
      run_tier3:
        description: "Run the tier3 leg (workflow + observability planes)"
        required: false
        type: boolean
        default: true
      run_ui:
        description: "Run the Playwright UI leg (full stack + Backstage)"
        required: false
        type: boolean
        default: true
      run_quick_start:
        description: "Run the Quick Start smoke leg (published quick-start container, all four planes + sample deploy)"
        required: false
        type: boolean
        default: true
      run_ext_idp:
        description: "Run the external IdP leg (Dex as OIDC provider, Playwright)"
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out and test: full 40-char commit SHA, branch, or tag (actions/checkout can't resolve an abbreviated SHA); defaults to the caller's ref"
        required: false
        type: string
        default: ""
      helm_chart_version:
        description: "Helm chart version (e.g., 0.0.0-latest-dev or 0.0.0-<8-char-short-sha>)"
        required: false
        type: string
        default: "0.0.0-latest-dev"
      backstage_image_tag:
        description: "Backstage (openchoreo-ui) image tag for the UI leg, e.g. the backstage-plugins commit's 8-char short SHA or 'latest-dev'; empty uses the chart's AppVersion default"
        required: false
        type: string
        default: ""
      run_tier1:
        description: "Run the tier1 leg"
        required: false
        type: boolean
        default: true
      run_tier2:
        description: "Run the tier2 leg"
        required: false
        type: boolean
        default: true
      run_tier3:
        description: "Run the tier3 leg (workflow + observability planes)"
        required: false
        type: boolean
        default: true
      run_ui:
        description: "Run the Playwright UI leg (full stack + Backstage)"
        required: false
        type: boolean
        default: true
      run_quick_start:
        description: "Run the Quick Start smoke leg (published quick-start container, all four planes + sample deploy)"
        required: false
        type: boolean
        default: true
      run_ext_idp:
        description: "Run the external IdP leg (Dex as OIDC provider, Playwright)"
        required: false
        type: boolean
        default: true
    secrets:
      E2E_GITHUB_PAT:
        description: "GitHub PAT with read access to the private build-test repo. When empty, the private-repo build spec self-skips."
        required: false


permissions:
  contents: read

env:
  # `inputs` is empty on the nightly `schedule` trigger, so fall back to the
  # rolling latest-dev chart; the dispatch/call paths already default to it too.
  HELM_CHART_VERSION: ${{ inputs.helm_chart_version || '0.0.0-latest-dev' }}
  K3D_VERSION: v5.8.3
  K3D_SHA256: dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e
  YQ_VERSION: v4.45.4
  YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69

jobs:
  tier1:
    name: E2E (Tier 1)
    # On `schedule` inputs is empty (the nightly runs every leg); dispatch/call honor the toggle.
    if: ${{ github.event_name == 'schedule' || inputs.run_tier1 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Clone workflow actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _workflow
          persist-credentials: false

      - name: Setup Go
        uses: ./_workflow/.github/actions/setup-go

      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/${{ env.K3D_VERSION }}/k3d-linux-amd64
          echo "${{ env.K3D_SHA256 }}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        run: |
          curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          echo "${{ env.YQ_SHA256 }}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Validate Helm chart version
        run: |
          if [[ ! "${HELM_CHART_VERSION}" =~ ^0\.0\.0-(latest-dev|[0-9a-f]{8})$ ]]; then
            echo "::error::HELM_CHART_VERSION must be '0.0.0-latest-dev' or '0.0.0-<8-char-short-sha>' (got '${HELM_CHART_VERSION}')"
            exit 1
          fi

      - name: Add e2e host entries
        run: echo '127.0.0.1 api.e2e-cp.local thunder.e2e-cp.local openchoreo.e2e-cp.local' | sudo tee -a /etc/hosts

      - name: Run e2e tests (tier 1)
        run: |
          make e2e \
            E2E_HELM_SOURCE=oci \
            HELM_CHART_VERSION="${HELM_CHART_VERSION}" \
            E2E_SETUP_TIMEOUT=10m \
            E2E_LABEL_FILTER='tier1'

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics-tier1
          path: test/e2e/_diagnostics/
          retention-days: 7
          if-no-files-found: ignore

  tier2:
    name: E2E (Tier 2)
    if: ${{ github.event_name == 'schedule' || inputs.run_tier2 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Clone workflow actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _workflow
          persist-credentials: false

      - name: Setup Go
        uses: ./_workflow/.github/actions/setup-go

      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/${{ env.K3D_VERSION }}/k3d-linux-amd64
          echo "${{ env.K3D_SHA256 }}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        run: |
          curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          echo "${{ env.YQ_SHA256 }}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Validate Helm chart version
        run: |
          if [[ ! "${HELM_CHART_VERSION}" =~ ^0\.0\.0-(latest-dev|[0-9a-f]{8})$ ]]; then
            echo "::error::HELM_CHART_VERSION must be '0.0.0-latest-dev' or '0.0.0-<8-char-short-sha>' (got '${HELM_CHART_VERSION}')"
            exit 1
          fi

      - name: Add e2e host entries
        run: echo '127.0.0.1 api.e2e-cp.local thunder.e2e-cp.local openchoreo.e2e-cp.local' | sudo tee -a /etc/hosts

      - name: Run e2e tests (tier 2)
        run: |
          make e2e \
            E2E_HELM_SOURCE=oci \
            HELM_CHART_VERSION="${HELM_CHART_VERSION}" \
            E2E_SETUP_TIMEOUT=10m \
            E2E_LABEL_FILTER='tier2'

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics-tier2
          path: test/e2e/_diagnostics/
          retention-days: 7
          if-no-files-found: ignore

  tier3:
    name: E2E (Tier 3 — Multi-cluster)
    if: ${{ github.event_name == 'schedule' || inputs.run_tier3 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Clone workflow actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _workflow
          persist-credentials: false

      - name: Setup Go
        uses: ./_workflow/.github/actions/setup-go

      - name: Install k3d
        run: |
          curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/${{ env.K3D_VERSION }}/k3d-linux-amd64
          echo "${{ env.K3D_SHA256 }}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        run: |
          curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          echo "${{ env.YQ_SHA256 }}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Validate Helm chart version
        run: |
          if [[ ! "${HELM_CHART_VERSION}" =~ ^0\.0\.0-(latest-dev|[0-9a-f]{8})$ ]]; then
            echo "::error::HELM_CHART_VERSION must be '0.0.0-latest-dev' or '0.0.0-<8-char-short-sha>' (got '${HELM_CHART_VERSION}')"
            exit 1
          fi

      - name: Add e2e multi-cluster host entries
        # CP cluster external domains plus the OP observer hostname. The observer
        # is reachable from the runner via the OP cluster's loadbalancer port
        # mapping (31080:11080), so the observer MCP specs drive host-side MCP
        # sessions against observer.e2e-mc-op.local. Other DP/WP/OP services are
        # still reached only via host.k3d.internal from within k3d nodes.
        run: echo '127.0.0.1 api.e2e-mc-cp.local thunder.e2e-mc-cp.local openchoreo.e2e-mc-cp.local cluster-gateway.e2e-mc-cp.local observer.e2e-mc-op.local' | sudo tee -a /etc/hosts

      - name: Run multi-cluster e2e tests (tier 3)
        env:
          E2E_GITHUB_PAT: ${{ secrets.E2E_GITHUB_PAT }}
        run: |
          make e2e.multi \
            E2E_HELM_SOURCE=oci \
            HELM_CHART_VERSION="${HELM_CHART_VERSION}" \
            E2E_SETUP_TIMEOUT=20m \
            E2E_TEST_TIMEOUT=60m \
            E2E_LABEL_FILTER='tier3'

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics-tier3
          path: test/e2e/_diagnostics/
          retention-days: 7
          if-no-files-found: ignore

  ui:
    name: E2E (UI / Playwright)
    if: ${{ github.event_name == 'schedule' || inputs.run_ui }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      E2E_WITH_BUILD: "true"
      E2E_WITH_OBSERVABILITY: "true"
      E2E_WITH_UI: "true"
      # Backstage image tag for the UI install. openchoreo-ui is built by the
      # backstage-plugins repo (tagged with its commit short SHA), so the chart's
      # AppVersion default has no matching image at the release ref; the caller
      # passes the backstage-plugins release-branch tip SHA here. Empty on the
      # schedule/dispatch paths, where the latest-dev chart's AppVersion resolves.
      E2E_BACKSTAGE_IMAGE_TAG: ${{ inputs.backstage_image_tag }}
      E2E_KUBECONTEXT: k3d-openchoreo-e2e
      UI_BASE_URL: http://openchoreo.e2e-cp.local:28080
      # OpenChoreo API URL the pkce-login spec points occ at (NOT the Backstage
      # portal URL above).
      OCC_CONTROL_PLANE_URL: http://api.e2e-cp.local:28080
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Check UI suite presence
        # Older release branches predate the Playwright suite; skip the leg
        # gracefully instead of failing the gate for refs without test/ui.
        id: ui-suite
        run: |
          if [ -f test/ui/package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::test/ui is not present at this ref; skipping the UI e2e leg"
          fi

      - name: Clone workflow actions
        if: steps.ui-suite.outputs.present == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _workflow
          persist-credentials: false

      - name: Setup Go
        if: steps.ui-suite.outputs.present == 'true'
        uses: ./_workflow/.github/actions/setup-go

      - name: Setup Node
        if: steps.ui-suite.outputs.present == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: test/ui/package-lock.json

      - name: Install k3d
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/${{ env.K3D_VERSION }}/k3d-linux-amd64
          echo "${{ env.K3D_SHA256 }}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          echo "${{ env.YQ_SHA256 }}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Validate Helm chart version
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          if [[ ! "${HELM_CHART_VERSION}" =~ ^0\.0\.0-(latest-dev|[0-9a-f]{8})$ ]]; then
            echo "::error::HELM_CHART_VERSION must be '0.0.0-latest-dev' or '0.0.0-<8-char-short-sha>' (got '${HELM_CHART_VERSION}')"
            exit 1
          fi

      - name: Validate Backstage image tag
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          if [[ -n "${E2E_BACKSTAGE_IMAGE_TAG}" && ! "${E2E_BACKSTAGE_IMAGE_TAG}" =~ ^(latest-dev|[0-9a-f]{8})$ ]]; then
            echo "::error::backstage_image_tag must be empty, 'latest-dev', or an 8-char short SHA (got '${E2E_BACKSTAGE_IMAGE_TAG}')"
            exit 1
          fi

      - name: Map e2e hostnames for host processes
        # The browsers resolve *.e2e-cp.local via Chromium host-resolver-rules,
        # but occ (driven by the pkce-login spec) is a host process and needs
        # real DNS — without this entry the spec self-skips.
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          echo "127.0.0.1 openchoreo.e2e-cp.local api.e2e-cp.local thunder.e2e-cp.local" | sudo tee -a /etc/hosts

      - name: Build occ CLI
        # The pkce-login spec spawns bin/occ for the browser-assisted PKCE leg.
        if: steps.ui-suite.outputs.present == 'true'
        run: make go.build.occ

      - name: Install UI test dependencies
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npm ci

      - name: Install Playwright browsers
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npx playwright install --with-deps chromium

      - name: Install OpenChoreo e2e cluster
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          make e2e.setup \
            E2E_HELM_SOURCE=oci \
            HELM_CHART_VERSION="${HELM_CHART_VERSION}" \
            E2E_WITH_BUILD="${E2E_WITH_BUILD}" \
            E2E_WITH_OBSERVABILITY="${E2E_WITH_OBSERVABILITY}" \
            E2E_WITH_UI="${E2E_WITH_UI}" \
            E2E_BACKSTAGE_IMAGE_TAG="${E2E_BACKSTAGE_IMAGE_TAG}" \
            E2E_SETUP_TIMEOUT=10m

      - name: Run UI e2e tests
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npm test

      - name: Collect e2e diagnostics
        if: failure()
        run: make e2e.diagnostics || true

      - name: Upload e2e diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-e2e-diagnostics
          path: test/e2e/_diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-e2e-playwright-report
          path: test/ui/_report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-e2e-test-results
          path: test/ui/_test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Delete e2e cluster
        if: always()
        run: make e2e.down || true

  ext-idp:
    name: E2E (External IdP / Dex)
    if: ${{ github.event_name == 'schedule' || inputs.run_ext_idp }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      E2E_WITH_EXT_IDP: "true"
      E2E_KUBECONTEXT: k3d-openchoreo-e2e
      UI_BASE_URL: http://openchoreo.e2e-cp.local:28080
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Check UI suite presence
        # Older release branches predate the Playwright suite; skip the leg
        # gracefully instead of failing the gate for refs without test/ui.
        id: ui-suite
        run: |
          if [ -f test/ui/package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::test/ui is not present at this ref; skipping the ext-idp e2e leg"
          fi

      - name: Clone workflow actions
        if: steps.ui-suite.outputs.present == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: _workflow
          persist-credentials: false

      - name: Setup Go
        if: steps.ui-suite.outputs.present == 'true'
        uses: ./_workflow/.github/actions/setup-go

      - name: Setup Node
        if: steps.ui-suite.outputs.present == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: test/ui/package-lock.json

      - name: Install k3d
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          curl -fsSL -o /tmp/k3d https://github.com/k3d-io/k3d/releases/download/${{ env.K3D_VERSION }}/k3d-linux-amd64
          echo "${{ env.K3D_SHA256 }}  /tmp/k3d" | sha256sum -c -
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Install yq
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          curl -fsSL -o /tmp/yq https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64
          echo "${{ env.YQ_SHA256 }}  /tmp/yq" | sha256sum -c -
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Validate Helm chart version
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          if [[ ! "${HELM_CHART_VERSION}" =~ ^0\.0\.0-(latest-dev|[0-9a-f]{8})$ ]]; then
            echo "::error::HELM_CHART_VERSION must be '0.0.0-latest-dev' or '0.0.0-<8-char-short-sha>' (got '${HELM_CHART_VERSION}')"
            exit 1
          fi

      - name: Map e2e hostnames for host processes
        # Browsers use --host-resolver-rules; this entry covers any host process
        # (e.g. occ) that resolves via the OS resolver.
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          echo "127.0.0.1 openchoreo.e2e-cp.local api.e2e-cp.local dex.e2e-cp.local" | sudo tee -a /etc/hosts

      - name: Install UI test dependencies
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npm ci

      - name: Install Playwright browsers
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npx playwright install --with-deps chromium

      - name: Install OpenChoreo e2e cluster with Dex
        if: steps.ui-suite.outputs.present == 'true'
        run: |
          make e2e.setup \
            E2E_HELM_SOURCE=oci \
            HELM_CHART_VERSION="${HELM_CHART_VERSION}" \
            E2E_WITH_EXT_IDP="${E2E_WITH_EXT_IDP}" \
            E2E_SETUP_TIMEOUT=10m

      - name: Run ext-idp Playwright tests
        if: steps.ui-suite.outputs.present == 'true'
        working-directory: test/ui
        run: npm test

      - name: Collect e2e diagnostics
        if: failure()
        run: make e2e.diagnostics || true

      - name: Upload e2e diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ext-idp-e2e-diagnostics
          path: test/e2e/_diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ext-idp-e2e-playwright-report
          path: test/ui/_report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ext-idp-e2e-test-results
          path: test/ui/_test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Delete e2e cluster
        if: always()
        run: make e2e.down || true

  quick-start:
    name: E2E (Quick Start Smoke)
    if: ${{ github.event_name == 'schedule' || inputs.run_quick_start }}
    permissions:
      contents: read
    uses: ./.github/workflows/test-quick-start.yml
    with:
      # Concrete version on the input-less schedule trigger too (dispatch/call
      # already default it), so the nested quick-start workflow always receives
      # a real chart version.
      helm_chart_version: ${{ inputs.helm_chart_version || '0.0.0-latest-dev' }}
