[request_definition]
# sub: group, service account etc
# hierarchical resource path (e.g., "ns/acme/project/p1/component/c1")
# act: action string (e.g., "component:create", "deployment:read")
# ctx: additional context JSON
r = sub, resource, act, ctx

[policy_definition]
# sub: subject
# resource: resource prefix for hierarchical matching
# role: role name
# role_ns: "*" for cluster roles, namespace name for namespace-scoped roles
# eft: allow / deny
# cond: conditions JSON
# binding_name: name of the AuthzRoleBinding or ClusterAuthzRoleBinding (used by condMatch for log attribution)
p = sub, resource, role, role_ns, eft, cond, binding_name

[role_definition]
# g: role to action mapping with namespace/domain support
# Format: g, <role>, <action>, <namespace>
# For cluster roles: g, <role>, <action>, "*"
# For namespace roles: g, <role>, <action>, <namespace>
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = r.sub == p.sub && resourceMatch(r.resource, p.resource) && g(p.role, r.act, p.role_ns) && condMatch(r.ctx, r.act, p.cond, p.eft, p.binding_name)
