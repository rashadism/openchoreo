componentName: my-api
namespace: acme-corp
projectName: online-store
includeFieldDescriptions: true
includeStructuralComments: true
---
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: web-app
spec:
  workloadType: deployment
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - environment
        - logFormat
      properties:
        environment:
          type: string
          enum:
            - "development environment"
            - "staging environment"
            - "production environment"
          description: "Enum with spaces in values"
        logFormat:
          type: string
          enum:
            - json
            - text
            - "key=value pairs"
          description: "Enum with special characters"
        greeting:
          type: string
          default: "Hello, World!"
          description: "Default with comma and exclamation"
        timeFormat:
          type: string
          default: "HH:mm:ss"
          description: "Default with colons (YAML special)"
        queryTemplate:
          type: string
          default: "SELECT * FROM \"users\" WHERE status = 'active'"
          description: "Default with quotes inside"
        trueFalseString:
          type: string
          default: "true"
          description: "Boolean-like string that needs quoting"
        zipCode:
          type: string
          default: "00123"
          description: "Number-like string with leading zeros"
        multiline:
          type: string
          default: "line1\\nline2"
          description: "Default with escaped newline"
        specialTags:
          type: array
          default:
            - "tag:value"
            - "key=pair"
            - "with spaces"
          description: "Array with special string values"
          items:
            type: string
        specialLabels:
          type: object
          default:
            app.kubernetes.io/name: my-app
            version: 1.0.0
          description: "Map with special key format"
          additionalProperties:
            type: string
