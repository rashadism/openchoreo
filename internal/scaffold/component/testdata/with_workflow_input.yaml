componentName: my-api
namespace: acme-corp
projectName: online-store
includeWorkflow: true
includeFieldDescriptions: true
includeStructuralComments: true
---
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: web-app
spec:
  workloadType: deployment
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - port
      properties:
        port:
          type: integer
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workflow
metadata:
  name: docker-build
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - buildArgs
      properties:
        context:
          type: string
          default: "."
          description: "Docker build context"
        dockerfile:
          type: string
          default: "./Dockerfile"
          description: "Path to Dockerfile"
        buildArgs:
          type: object
          additionalProperties:
            type: string
          description: "Build arguments"
