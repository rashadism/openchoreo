componentName: my-api
namespace: acme-corp
projectName: online-store
includeFieldDescriptions: true
includeStructuralComments: true
---
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: web-app
spec:
  workloadType: deployment
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - enableMetrics
        - memoryLimit
        - username
        - email
        - region
        - port
        - database
      properties:
        # Boolean type
        debug:
          type: boolean
          default: false
        enableMetrics:
          type: boolean

        # Number type (float)
        cpuThreshold:
          type: number
          minimum: 0.1
          maximum: 1.0
          default: 0.8
        memoryLimit:
          type: number
          minimum: 0

        # String with validation constraints
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-z][a-z0-9_]*$"
        email:
          type: string
          format: email
        region:
          type: string
          minLength: 2
          maxLength: 50

        # Integer with validation constraints
        replicas:
          type: integer
          minimum: 1
          maximum: 100
          default: 3
        port:
          type: integer
          minimum: 1
          maximum: 65535
        timeout:
          type: integer
          minimum: 0
          maximum: 3600
          default: 30

        # Nested inline objects
        database:
          type: object
          required:
            - host
            - options
            - username
            - password
          properties:
            host:
              type: string
            port:
              type: integer
              default: 5432
              minimum: 1
              maximum: 65535
            username:
              type: string
            password:
              type: string
            options:
              type: object
              properties:
                ssl:
                  type: boolean
                  default: true
                timeout:
                  type: integer
                  default: 30
                  minimum: 1
                maxConnections:
                  type: integer
                  default: 10
                  minimum: 1
                  maximum: 1000

        # Object with default
        monitoring:
          type: object
          default: {}
          properties:
            enabled:
              type: boolean
              default: false
            port:
              type: integer
              default: 9090
            interval:
              type: integer
              default: 30

        # Nested object with default
        cache:
          type: object
          default: {}
          properties:
            enabled:
              type: boolean
              default: false
            ttl:
              type: integer
              default: 300
              minimum: 60
            maxSize:
              type: integer
              default: 1000
              minimum: 100
