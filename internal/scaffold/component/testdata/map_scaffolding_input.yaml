componentName: my-api
namespace: acme-corp
projectName: online-store
includeFieldDescriptions: true
includeStructuralComments: true
---
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: web-app
spec:
  workloadType: deployment
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - labels
        - ports
        - featureFlags
        - services
      properties:
        # Map with string values (required)
        labels:
          type: object
          description: "Resource labels"
          additionalProperties:
            type: string

        # Map with integer values (required)
        ports:
          type: object
          description: "Named port mappings"
          additionalProperties:
            type: integer

        # Map with boolean values (required)
        featureFlags:
          type: object
          description: "Feature toggle flags"
          additionalProperties:
            type: boolean

        # Map with custom type values (required)
        services:
          type: object
          description: "Service configurations"
          additionalProperties:
            type: object
            required:
              - endpoint
              - port
            properties:
              endpoint:
                type: string
              port:
                type: integer
                minimum: 1
                maximum: 65535
              enabled:
                type: boolean
                default: true
              timeout:
                type: integer
                default: 30
                minimum: 1

        # Optional map with default
        annotations:
          type: object
          default:
            app.kubernetes.io/name: my-app
          additionalProperties:
            type: string

        # Optional map with empty default
        customMetadata:
          type: object
          default: {}
          additionalProperties:
            type: string
