# OpenAPI V3 Schema with deeply nested objects
# Tests recursive conversion and defaulting
type: object
$defs:
  AutoscalingConfig:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
      minReplicas:
        type: integer
        default: 2
        minimum: 1
      maxReplicas:
        type: integer
        default: 10
        minimum: 1
      metrics:
        type: object
        properties:
          cpu:
            type: object
            properties:
              targetUtilization:
                type: integer
                default: 80
                minimum: 1
                maximum: 100
          memory:
            type: object
            properties:
              targetUtilization:
                type: integer
                default: 80
                minimum: 1
                maximum: 100
properties:
  autoscaling:
    $ref: "#/$defs/AutoscalingConfig"
  database:
    type: object
    properties:
      host:
        type: string
        description: Database host
      port:
        type: integer
        default: 5432
        minimum: 1
        maximum: 65535
      credentials:
        type: object
        properties:
          username:
            type: string
          secretRef:
            type: string
            description: Secret reference for database password
        required:
          - username
      pooling:
        type: object
        properties:
          maxConnections:
            type: integer
            default: 10
            minimum: 1
          idleTimeout:
            type: string
            default: "30s"
    required:
      - host
  tags:
    type: array
    items:
      type: string
    minItems: 0
    maxItems: 10
    default: []
required:
  - database
